<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100%; height: 100%; }
  </style>
</head>
<body data-porffor-module="porf_module">
<div id="porf-root" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;font-family:sans-serif;background:#ecf0f1;width:100%;height:100%;">
  <h1 id="title" style="color:#2c3e50;font-size:32px;margin-bottom:20px;">Dong Porf Counter</h1>
  <div id="count-display" style="font-size:64px;font-weight:bold;margin-bottom:30px;"></div>
  <div style="display:flex;gap:10px;">
    <button id="btn-dec" style="padding:12px 24px;background:#e74c3c;color:white;border:none;border-radius:6px;font-size:18px;min-width:60px;">-</button>
    <button id="btn-reset" style="padding:12px 24px;background:#95a5a6;color:white;border:none;border-radius:6px;font-size:18px;min-width:60px;">Reset</button>
    <button id="btn-inc" style="padding:12px 24px;background:#27ae60;color:white;border:none;border-radius:6px;font-size:18px;min-width:60px;">+</button>
  </div>
</div>
</body>
</html>
