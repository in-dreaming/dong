<!-- porffor: ready -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100%; height: 100%; }
  </style>
</head>
<body data-porffor-module="porf_todo">
<div id="porf-root" style="width:100%;height:100%;display:flex;align-items:flex-start;justify-content:center;background:#f0f3f5;font-family:sans-serif;padding-top:40px;">
  <div style="width:480px;padding:24px;">
    <h1 id="title" style="font-size:28px;color:#2c3e50;margin-bottom:24px;text-align:center;">Dong Porf Todo</h1>
    <div style="display:flex;gap:8px;margin-bottom:20px;">
      <input id="todo-input" placeholder="Add a new task..." style="flex:1;padding:12px 16px;font-size:15px;border:2px solid #dcdde1;border-radius:8px;background:#fff;" />
      <button id="btn-add" style="padding:12px 20px;background:#3498db;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:bold;">Add</button>
    </div>
    <div id="filter-bar" style="display:flex;gap:8px;margin-bottom:16px;">
      <button id="filter-all" style="padding:8px 16px;border:none;border-radius:6px;font-size:13px;">All</button>
      <button id="filter-active" style="padding:8px 16px;border:none;border-radius:6px;font-size:13px;">Active</button>
      <button id="filter-done" style="padding:8px 16px;border:none;border-radius:6px;font-size:13px;">Done</button>
    </div>
    <div id="todo-list"></div>
    
    <div id="clear-wrap" style="margin-top:16px;text-align:center;" hidden="1">
      <button id="btn-clear" style="padding:8px 16px;background:#e74c3c;color:#fff;border:none;border-radius:6px;font-size:13px;">Clear done</button>
    </div>
  </div>
</div>
</body>
</html>
