<!DOCTYPE html>
        <html>
        <head>
            <style>
                * {
                    box-sizing: border-box;
                }
                body {
                    margin: 0;
                    padding: 20px;
                    background-color: #1a1a2e;
                    color: #eaeaea;
                    font-family: Arial, sans-serif;
                }
                
                h1 {
                    font-size: 28px;
                    color: #00d4ff;
                    margin-bottom: 20px;
                }
                
                .section {
                    background-color: #16213e;
                    border-radius: 8px;
                    padding: 16px;
                    margin-bottom: 16px;
                }
                
                .section-title {
                    font-size: 18px;
                    color: #e94560;
                    margin-bottom: 12px;
                }
                
                /* Button Section */
                .button-row {
                    display: flex;
                    gap: 12px;
                }
                
                button {
                    background-color: #0f3460;
                    color: #ffffff;
                    padding: 12px 24px;
                    border-radius: 6px;
                    font-size: 16px;
                }
                
                #click-count {
                    margin-top: 12px;
                    font-size: 14px;
                    color: #94a3b8;
                }
                
                /* ScrollView Section */
                .scroll-container {
                    overflow: scroll;
                    height: 150px;
                    background-color: #0f3460;
                    border-radius: 6px;
                    padding: 8px;
                }
                
                .scroll-item {
                    padding: 10px;
                    margin-bottom: 8px;
                    background-color: #1a1a2e;
                    border-radius: 4px;
                }
                
                /* Input Section */
                .input-group {
                    margin-bottom: 12px;
                }
                
                .input-label {
                    font-size: 14px;
                    color: #94a3b8;
                    margin-bottom: 6px;
                }
                
                input {
                    width: 100%;
                    padding: 12px;
                    background-color: #0f3460;
                    color: #ffffff;
                    border-radius: 6px;
                    font-size: 16px;
                }
                
                #input-preview {
                    margin-top: 12px;
                    padding: 12px;
                    background-color: #0f3460;
                    border-radius: 6px;
                    font-size: 14px;
                    color: #94a3b8;
                }
                
                /* Status Bar */
                .status-bar {
                    position: fixed;
                    bottom: 0;
                    left: 0;
                    right: 0;
                    padding: 8px 20px;
                    background-color: #0f3460;
                    font-size: 12px;
                    color: #64748b;
                }
            </style>
        </head>
        <body>
            <h1>Hello</h1>
            
            <!-- Button Section -->
            <div class="section">
                <div class="section-title">Button Clicks</div>
                <div class="button-row">
                    <button id="btn-primary">Hello</button>
                </div>
                <div id="click-count">Clicks: 0</div>
            </div>
            
        </body>
        </html>
