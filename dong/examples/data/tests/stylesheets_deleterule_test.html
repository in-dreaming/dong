<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root {}
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }
    #box {
      width: 220px;
      height: 160px;
      background: rgb(255, 80, 80);
      border-radius: 18px;
      border: 4px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 12px 34px rgba(0,0,0,0.55);
    }
  </style>
</head>
<body>
  <div id="box"></div>
  <script>
    // Insert then delete a rule; final color should be the original red.
    var sheet = document.styleSheets[0];
    var idx = sheet.insertRule('#box { background-color: rgb(80, 255, 120); }', sheet.cssRules.length);
    sheet.deleteRule(idx);
  </script>
</body>
</html>
