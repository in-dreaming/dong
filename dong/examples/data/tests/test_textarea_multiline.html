<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
<style>
body {
    font-family: sans-serif;
    font-size: 16px;
    padding: 20px;
    background: #f0f0f0;
}
.section {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}
label { display: block; margin-bottom: 5px; font-weight: bold; }
input[type="text"] {
    width: 350px;
    padding: 8px;
    font-size: 16px;
    border: 2px solid #888;
    border-radius: 4px;
    margin-bottom: 10px;
}
textarea {
    width: 350px;
    height: 120px;
    padding: 8px;
    font-size: 16px;
    border: 2px solid #888;
    border-radius: 4px;
}
input:focus, textarea:focus {
    border-color: #4488ff;
    outline: none;
}
#log {
    margin-top: 10px;
    padding: 8px;
    background: #111;
    color: #0f0;
    font-family: monospace;
    font-size: 12px;
    height: 80px;
    overflow: auto;
    white-space: pre;
}
</style>
</head>
<body>
<h3>Textarea Multiline Test</h3>

<div class="section">
    <label>Single-line input (baseline):</label>
    <input type="text" id="i1" value="Click me to test caret" />
</div>

<div class="section">
    <label>Textarea with existing newlines:</label>
    <textarea id="t1">Line one
Line two
Line three</textarea>
</div>

<div class="section">
    <label>Empty textarea - type and press Enter:</label>
    <textarea id="t2"></textarea>
</div>

<div id="log">Ready.</div>

<script>
var log = document.getElementById('log');
function addLog(msg) {
    log.textContent += '\n' + msg;
    log.scrollTop = log.scrollHeight;
}
var els = ['i1', 't1', 't2'];
for (var i = 0; i < els.length; i++) {
    var el = document.getElementById(els[i]);
    if (el) {
        el.addEventListener('input', function(e) {
            var v = e.target.value;
            var lines = v.split('\n').length;
            addLog(e.target.id + ' input: lines=' + lines + ' len=' + v.length);
        });
        el.addEventListener('focus', function(e) {
            addLog(e.target.id + ' focused');
        });
    }
}
</script>
</body>
</html>
