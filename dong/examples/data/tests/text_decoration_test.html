<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a2e;
            color: #eaeaea;
            font-family: Arial, sans-serif;
        }
        .section {
            background-color: #16213e;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 16px;
            color: #e94560;
            margin-bottom: 12px;
        }
        .demo-row {
            margin-bottom: 12px;
        }
        .demo-item {
            display: inline-block;
            min-width: 160px;
            min-height: 40px;
            margin: 6px 10px 6px 0;
            padding: 12px 18px;
            background-color: #0b1f3f;
            border: 1px solid rgba(0, 212, 255, 0.45);
            border-radius: 8px;
            color: #ffffff;
            text-align: left;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1.2;
            vertical-align: top;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
        }
        .text-underline {
            text-decoration: underline;
            font-size: 18px;
        }
        .text-line-through {
            text-decoration: line-through;
            font-size: 18px;
        }
        .text-overline {
            text-decoration: overline;
            font-size: 18px;
        }
        .text-deco-color {
            text-decoration: underline;
            text-decoration-color: #e94560;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="section">
        <div class="section-title">CSS Text Decoration Test</div>
        <div class="demo-row">
            <div class="demo-item text-underline">Underline Text</div>
            <div class="demo-item text-line-through">Line-through Text</div>
            <div class="demo-item text-overline">Overline Text</div>
        </div>
        <div class="demo-row">
            <div class="demo-item text-deco-color">Colored Underline</div>
        </div>
    </div>
</body>
</html>
