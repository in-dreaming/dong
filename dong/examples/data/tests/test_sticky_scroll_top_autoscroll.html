<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #ffffff;
        }

        /* Keep this test geometry-only (no text) to reduce font/AA diffs in baseline_compare. */
        .scroll-container {
            width: 600px;
            height: 400px;
            overflow: auto;
            border: 2px solid #333;
            background: #f0f0f0;
        }

        .content {
            padding: 20px;
        }

        .block {
            height: 150px;
            margin-bottom: 20px;
            background: #ddd;
            border: 1px solid #999;
        }

        .sticky {
            position: sticky;
            top: 10px;
            height: 40px;
            background: #4CAF50;
            border: 2px solid #2E7D32;
            margin-bottom: 20px;
        }

        /* A thin marker below sticky to validate flow order under scroll. */
        .marker {
            height: 12px;
            margin-bottom: 20px;
            background: #ff00ff;
        }
    </style>
</head>
<body>
    <div class="scroll-container" id="sc">
        <div class="content">
            <div class="block"></div>
            <div class="sticky" id="sticky"></div>
            <div class="marker" id="marker"></div>
            <div class="block"></div>
            <div class="block"></div>
            <div class="block"></div>
            <div class="block"></div>
            <div class="block"></div>
            <div class="block"></div>
            <div class="block"></div>
            <div class="block"></div>
            <div class="block"></div>
            <div class="block"></div>
            <div class="block"></div>
            <div class="block"></div>
            <div class="block"></div>
            <div class="block"></div>
        </div>
    </div>

    <script>
        // Force a deterministic scroll position so baseline_compare can validate sticky.
        // Keep it single-shot; dong's JS runtime doesn't guarantee browser-like timers.
        (function () {
            var sc = document.getElementById('sc');
            if (!sc) return;

            sc.scrollTop = 800;

        // Note: in dong, scrollHeight/clientHeight are initialized during the render traversal,
        // so don't read them here (browser does layout before scripts observe geometry).
        // Keep this test focused on sticky behavior under a deterministic scrollTop.
        })();
    </script>
</body>
</html>
