<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: sans-serif; padding: 20px; }
button { padding: 8px 16px; margin: 5px; cursor: pointer; }
#content { padding: 10px; border: 1px solid #ccc; margin: 10px 0; }
#log { margin-top: 10px; padding: 10px; border: 1px solid #ccc; min-height: 50px; }
::selection { background: #b4d5fe; color: #000; }
</style>
</head>
<body>
<h2>Selection API Test</h2>

<div id="content">
    <p id="para">Hello World! This is a test paragraph for selection.</p>
    <p id="para2">Second paragraph with more text content.</p>
</div>

<button id="create-range-btn">Create Range (select "World")</button>
<button id="get-selection-btn">Get Selection</button>
<button id="select-all-btn">Select All</button>
<button id="clear-btn">Clear Selection</button>

<div id="log"></div>

<script>
var log = document.getElementById('log');

function addLog(msg) {
    log.textContent += msg + '\n';
}

document.getElementById('create-range-btn').addEventListener('click', function() {
    var range = document.createRange();
    var para = document.getElementById('para');
    if (para && para.childNodes.length > 0) {
        var textNode = para.childNodes[0];
        range.setStart(textNode, 6);  // After "Hello "
        range.setEnd(textNode, 11);   // Before "!"

        var sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);

        addLog('Created range: "' + range.toString() + '"');
        addLog('Range collapsed: ' + range.collapsed);
        addLog('Start offset: ' + range.startOffset);
        addLog('End offset: ' + range.endOffset);
    }
});

document.getElementById('get-selection-btn').addEventListener('click', function() {
    var sel = window.getSelection();
    addLog('Selection: "' + sel.toString() + '"');
    addLog('Range count: ' + sel.rangeCount);
    addLog('Is collapsed: ' + sel.isCollapsed);
});

document.getElementById('select-all-btn').addEventListener('click', function() {
    var sel = window.getSelection();
    var content = document.getElementById('content');
    sel.selectAllChildren(content);
    addLog('Selected all children of #content');
});

document.getElementById('clear-btn').addEventListener('click', function() {
    var sel = window.getSelection();
    sel.removeAllRanges();
    addLog('Selection cleared');
});

addLog('Selection API test ready');
</script>
</body>
</html>
