<!DOCTYPE html>
<html>
<head>
<style>
  body { font-size: 16px; padding: 20px; }
  #target { padding: 20px; background: lightyellow; border: 2px solid orange; min-height: 60px; }
  #result { margin-top: 20px; padding: 10px; background: #eee; white-space: pre; font-family: monospace; }
</style>
</head>
<body>
  <h1>KeyboardEvent.repeat 属性测试</h1>

  <input id="target" type="text" placeholder="在此输入文本测试 repeat 属性">
  <div id="result"></div>

  <script>
    var r = '';
    var target = document.getElementById('target');
    var result = document.getElementById('result');

    // 测试 keydown 事件 - repeat 属性
    target.addEventListener('keydown', function(e) {
      r += 'keydown 事件:\n';
      r += '  key=' + e.key + ', code=' + e.code + '\n';
      r += '  repeat=' + e.repeat + ' (true=长按重复, false=首次按下)\n';
      r += '  keyCode=' + e.keyCode + ', charCode=' + e.charCode + '\n';
      r += '  which=' + e.which + '\n';
      r += '  altKey=' + e.altKey + ', ctrlKey=' + e.ctrlKey + '\n';
      r += '  shiftKey=' + e.shiftKey + ', metaKey=' + e.metaKey + '\n';
      r += '  isTrusted=' + e.isTrusted + '\n';
      result.textContent = r;
    });

    // 测试 keyup 事件 - repeat 属性
    target.addEventListener('keyup', function(e) {
      r += 'keyup 事件:\n';
      r += '  key=' + e.key + ', code=' + e.code + '\n';
      r += '  repeat=' + e.repeat + '\n';
      r += '  keyCode=' + e.keyCode + ', charCode=' + e.charCode + '\n';
      r += '  which=' + e.which + '\n';
      r += '  altKey=' + e.altKey + ', ctrlKey=' + e.ctrlKey + '\n';
      r += '  shiftKey=' + e.shiftKey + ', metaKey=' + e.metaKey + '\n';
      r += '  isTrusted=' + e.isTrusted + '\n';
      result.textContent = r;
    });

    // 测试 keypress 事件
    target.addEventListener('keypress', function(e) {
      r += 'keypress 事件:\n';
      r += '  key=' + e.key + ', code=' + e.code + '\n';
      r += '  repeat=' + e.repeat + '\n';
      r += '  keyCode=' + e.keyCode + ', charCode=' + e.charCode + '\n';
      r += '  which=' + e.which + '\n';
      r += '  isTrusted=' + e.isTrusted + '\n';
      result.textContent = r;
    });

    r += 'KeyboardEvent.repeat 属性测试已加载\n';
    r += '测试说明:\n';
    r += '- 在输入框中输入文本观察键盘事件\n';
    r += '- 长按某个键观察 repeat 属性从 false 变为 true\n';
    r += '- keydown 事件在长按时会重复触发，repeat=true\n';
    r += '- keyup 事件只在按键释放时触发，repeat=false\n';
    r += '- 所有事件都包含 isTrusted 属性\n';
    result.textContent = r;
    console.log('KeyboardEvent.repeat 属性测试已加载');
  </script>
</body>
</html>
