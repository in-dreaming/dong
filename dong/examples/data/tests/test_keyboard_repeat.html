<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
<style>
  body { font-size: 16px; padding: 20px; }
  #target { padding: 20px; background: lightyellow; border: 2px solid orange; min-height: 60px; }
  #result { margin-top: 20px; padding: 10px; background: #eee; white-space: pre; font-family: monospace; }
</style>
</head>
<body>
  <h1>KeyboardEvent.repeat еұһжҖ§жөӢиҜ•</h1>

  <input id="target" type="text" placeholder="еңЁжӯӨиҫ“е…Ҙж–Үжң¬жөӢиҜ• repeat еұһжҖ§">
  <div id="result"></div>

  <script>
    var r = '';
    var target = document.getElementById('target');
    var result = document.getElementById('result');

    // жөӢиҜ• keydown дәӢд»¶ - repeat еұһжҖ§
    target.addEventListener('keydown', function(e) {
      r += 'keydown дәӢд»¶:\n';
      r += '  key=' + e.key + ', code=' + e.code + '\n';
      r += '  repeat=' + e.repeat + ' (true=й•ҝжҢүйҮҚеӨҚ, false=йҰ–ж¬ЎжҢүдёӢ)\n';
      r += '  keyCode=' + e.keyCode + ', charCode=' + e.charCode + '\n';
      r += '  which=' + e.which + '\n';
      r += '  altKey=' + e.altKey + ', ctrlKey=' + e.ctrlKey + '\n';
      r += '  shiftKey=' + e.shiftKey + ', metaKey=' + e.metaKey + '\n';
      r += '  isTrusted=' + e.isTrusted + '\n';
      result.textContent = r;
    });

    // жөӢиҜ• keyup дәӢд»¶ - repeat еұһжҖ§
    target.addEventListener('keyup', function(e) {
      r += 'keyup дәӢд»¶:\n';
      r += '  key=' + e.key + ', code=' + e.code + '\n';
      r += '  repeat=' + e.repeat + '\n';
      r += '  keyCode=' + e.keyCode + ', charCode=' + e.charCode + '\n';
      r += '  which=' + e.which + '\n';
      r += '  altKey=' + e.altKey + ', ctrlKey=' + e.ctrlKey + '\n';
      r += '  shiftKey=' + e.shiftKey + ', metaKey=' + e.metaKey + '\n';
      r += '  isTrusted=' + e.isTrusted + '\n';
      result.textContent = r;
    });

    // жөӢиҜ• keypress дәӢд»¶
    target.addEventListener('keypress', function(e) {
      r += 'keypress дәӢд»¶:\n';
      r += '  key=' + e.key + ', code=' + e.code + '\n';
      r += '  repeat=' + e.repeat + '\n';
      r += '  keyCode=' + e.keyCode + ', charCode=' + e.charCode + '\n';
      r += '  which=' + e.which + '\n';
      r += '  isTrusted=' + e.isTrusted + '\n';
      result.textContent = r;
    });

    r += 'KeyboardEvent.repeat еұһжҖ§жөӢиҜ•е·ІеҠ иҪҪ\n';
    r += 'жөӢиҜ•иҜҙжҳҺ:\n';
    r += '- еңЁиҫ“е…ҘжЎҶдёӯиҫ“е…Ҙж–Үжң¬и§ӮеҜҹй”®зӣҳдәӢд»¶\n';
    r += '- й•ҝжҢүжҹҗдёӘй”®и§ӮеҜҹ repeat еұһжҖ§д»Һ false еҸҳдёә true\n';
    r += '- keydown дәӢд»¶еңЁй•ҝжҢүж—¶дјҡйҮҚеӨҚи§ҰеҸ‘пјҢrepeat=true\n';
    r += '- keyup дәӢд»¶еҸӘеңЁжҢүй”®йҮҠж”ҫж—¶и§ҰеҸ‘пјҢrepeat=false\n';
    r += '- жүҖжңүдәӢд»¶йғҪеҢ…еҗ« isTrusted еұһжҖ§\n';
    result.textContent = r;
    console.log('KeyboardEvent.repeat еұһжҖ§жөӢиҜ•е·ІеҠ иҪҪ');
  </script>
</body>
</html>
