<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .scroll-container {
            width: 600px;
            height: 400px;
            overflow: auto;
            border: 2px solid #333;
            background: #f0f0f0;
        }
        .content {
            padding: 20px;
        }
        .block {
            height: 150px;
            margin-bottom: 20px;
            padding: 20px;
            background: #ddd;
            border: 1px solid #999;
        }
        .sticky {
            position: sticky;
            bottom: 10px;
            background: #2196F3;
            color: white;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #1565C0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Sticky Positioning Test - Bottom</h1>
    <p>Scroll up in the container. The blue box should stick 10px from the bottom.</p>

    <div class="scroll-container">
        <div class="content">
            <div class="block">Block 1</div>
            <div class="block">Block 2</div>
            <div class="block">Block 3</div>
            <div class="block">Block 4</div>

            <div class="sticky">STICKY ELEMENT - Bottom: 10px</div>

            <div class="block">Block 5</div>
            <div class="block">Block 6 - After sticky</div>
        </div>
    </div>
</body>
</html>
