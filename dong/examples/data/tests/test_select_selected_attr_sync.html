<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
  <meta charset="UTF-8" />
  <title>Select - selected attribute sync</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #fafafa; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 12px 0; }
    select { padding: 10px; font-size: 16px; border: 2px solid #2196f3; border-radius: 6px; background: #fff; width: 320px; }
    .mono { font-family: Menlo, Monaco, Consolas, 'Courier New', monospace; font-size: 13px; background: #111; color: #f5f5f5; padding: 10px; border-radius: 6px; margin-top: 10px; }
    .hint { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Select - selected attribute sync (Chunk 8)</h1>

  <div class="card">
    <h2>Test: option[selected] should control initial selectedIndex/value</h2>
    <select id="s">
      <option value="x" disabled>X (disabled)</option>
      <option value="y" selected>Y (selected)</option>
      <option value="z">Z</option>
    </select>
    <div class="mono" id="out">(pending)</div>
    <div class="hint">Expected: selectedIndex=1 value="y" (skip disabled default).</div>
  </div>

  <script>
    (function () {
      var s = document.getElementById('s');
      var out = document.getElementById('out');
      out.textContent = 'value="' + s.value + '" selectedIndex=' + s.selectedIndex;
    })();
  </script>
</body>
</html>
