<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 28px;
      background: #0b1220;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 14px 0;
      color: #93c5fd;
    }
    .row {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .card {
      width: 240px;
      height: 150px;
      border-radius: 16px;
      padding: 26px;
      background-color: #ff3355;
      box-shadow: 0 10px 24px rgba(0,0,0,0.45);
    }
    .label {
      font-size: 12px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-shadow: 0 1px 0 rgba(0,0,0,0.25);
    }
    .inner {
      width: 100%;
      height: calc(100% - 22px);
      border-radius: 10px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.14);
    }

    /* background-clip test: padding-box (default) vs content-box */
    .clip-padding { background-clip: padding-box; }
    .clip-content { background-clip: content-box; }
  </style>
</head>
<body>
  <div class="title">CSS background-clip: padding-box vs content-box</div>
  <div class="row">
    <div class="card clip-padding">
      <div class="label">background-clip: padding-box</div>
      <div class="inner"></div>
    </div>
    <div class="card clip-content">
      <div class="label">background-clip: content-box</div>
      <div class="inner"></div>
    </div>
  </div>
</body>
</html>
