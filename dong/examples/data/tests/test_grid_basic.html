<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
<title>CSS Grid Basic Parsing Test</title>
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    .grid-container {
        display: grid;
        grid-template-columns: 1fr 2fr 1fr;
        grid-template-rows: 100px auto 50px;
        gap: 10px 20px;
        grid-auto-flow: row;
        width: 600px;
        background-color: #eee;
        padding: 10px;
    }

    .grid-item {
        background-color: #4CAF50;
        color: white;
        padding: 20px;
        text-align: center;
    }

    .item-span {
        grid-column: 1 / 3;
        grid-row: span 2;
        background-color: #2196F3;
    }

    .item-placed {
        grid-column-start: 2;
        grid-column-end: 4;
        grid-row-start: 1;
        grid-row-end: 2;
        background-color: #FF9800;
    }

    .grid-repeat {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 100px);
        grid-gap: 15px;
        grid-auto-columns: minmax(100px, auto);
        grid-auto-rows: 80px;
        width: 400px;
        margin-top: 20px;
        background-color: #ddd;
        padding: 10px;
    }

    .grid-areas {
        display: grid;
        grid-template-areas: "header header header"
                             "sidebar content content"
                             "footer footer footer";
        grid-template-columns: 200px 1fr 1fr;
        grid-template-rows: 60px 1fr 40px;
        row-gap: 5px;
        column-gap: 10px;
        width: 500px;
        margin-top: 20px;
        background-color: #ccc;
        padding: 10px;
    }

    .header { grid-area: header; background-color: #9C27B0; color: white; padding: 10px; }
    .sidebar { grid-area: sidebar; background-color: #009688; color: white; padding: 10px; }
    .content { grid-area: content; background-color: #3F51B5; color: white; padding: 10px; }
    .footer { grid-area: footer; background-color: #795548; color: white; padding: 10px; }

    .grid-dense {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-flow: row dense;
        gap: 5px;
        width: 300px;
        margin-top: 20px;
    }
</style>
</head>
<body>
    <h2>CSS Grid Parsing Test</h2>
    <p>This tests that grid CSS properties parse without crashing. Visual layout requires the grid layout engine (future).</p>

    <h3>Basic Grid</h3>
    <div class="grid-container">
        <div class="grid-item">1</div>
        <div class="grid-item">2</div>
        <div class="grid-item">3</div>
        <div class="grid-item item-span">Span</div>
        <div class="grid-item">5</div>
        <div class="grid-item item-placed">Placed</div>
    </div>

    <h3>Repeat Grid</h3>
    <div class="grid-repeat">
        <div class="grid-item">A</div>
        <div class="grid-item">B</div>
        <div class="grid-item">C</div>
        <div class="grid-item">D</div>
        <div class="grid-item">E</div>
        <div class="grid-item">F</div>
    </div>

    <h3>Named Areas</h3>
    <div class="grid-areas">
        <div class="header">Header</div>
        <div class="sidebar">Sidebar</div>
        <div class="content">Content</div>
        <div class="footer">Footer</div>
    </div>

    <h3>Dense Auto Flow</h3>
    <div class="grid-dense">
        <div class="grid-item">1</div>
        <div class="grid-item">2</div>
        <div class="grid-item">3</div>
        <div class="grid-item">4</div>
    </div>
</body>
</html>
