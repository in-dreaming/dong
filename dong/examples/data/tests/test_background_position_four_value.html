<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
  <meta charset="UTF-8">
  <title>background-position 1/2/3/4-value</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    /* Keep layout simple and stable: inline-block grid without flex/gap. */
    .container {
      font-size: 0; /* avoid inline-block whitespace gaps */
      width: 780px;
    }

    .test-case {
      display: inline-block;
      width: 240px;
      height: 160px;
      margin: 8px;
      background: #ffffff;
      border: 1px solid #d8d8d8;
      vertical-align: top;
    }

    .bg {
      width: 100%;
      height: 100%;
      background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACgAAAAoCAYAAACM/rhtAAAAfUlEQVR42u3YsRGAMAxDUQ1IwaaswRjeBDYA58jZ0fEL96+zJEXEtfIJIEBn4HbsZ+bKgVnYDKgqYF+gqsaNItWBG0GqC5dFqhOXQfoCq3BvSE9gNe4JCRAgQIAAHYH84hlA8uAM4PKR36I0WdROi+JuMX3YjEfsgwD/BLwBgFU2f6DTMX8AAAAASUVORK5CYII=");
      background-repeat: no-repeat;
      background-size: 80px 80px;
      image-rendering: pixelated;
    }

    /* 1-value syntax */
    .case1 .bg { background-position: center; }
    .case2 .bg { background-position: 25%; }

    /* 2-value syntax */
    .case3 .bg { background-position: 20% 80%; }
    .case4 .bg { background-position: 10px 30px; }

    /* 3-value syntax */
    .case5 .bg { background-position: right 10px top; }

    /* 4-value syntax */
    .case6 .bg { background-position: right 10px bottom 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="test-case case1"><div class="bg"></div></div>
    <div class="test-case case2"><div class="bg"></div></div>
    <div class="test-case case3"><div class="bg"></div></div>
    <div class="test-case case4"><div class="bg"></div></div>
    <div class="test-case case5"><div class="bg"></div></div>
    <div class="test-case case6"><div class="bg"></div></div>
  </div>
</body>
</html>
