<!DOCTYPE html>
<!-- porffor: dropped(dong.scene API) -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Scene Graph API Test</title>
<style>
* { margin: 0; padding: 0; }
body { background: #0a0e17; overflow: hidden; width: 960px; height: 600px; }
</style>
</head>
<body>
<script>
(function() {
    if (typeof dong === 'undefined' || !dong.scene) {
        document.body.innerHTML = '<div style="color:red;padding:20px">dong.scene API not available</div>';
        return;
    }

    var S = dong.scene;

    // Background panel
    S.addNode({
        name: 'bg', x: 0, y: 0, w: 960, h: 600,
        background: '#121417'
    });

    // Top bar
    S.addNode({
        name: 'topbar', x: 0, y: 0, w: 960, h: 40,
        background: '#161b22'
    });
    S.addNode({
        name: 'title', x: 16, y: 0, w: 200, h: 40,
        text: 'Scene Graph Demo', fontSize: 15, color: '#f0f6fc',
        fontWeight: 'bold', textAlign: 'left'
    });
    S.addNode({
        name: 'subtitle', x: 220, y: 0, w: 300, h: 40,
        text: 'Zero DOM — Pure SceneNode rendering', fontSize: 12, color: '#8b949e'
    });

    // Sidebar
    S.addNode({
        name: 'sidebar_bg', x: 0, y: 40, w: 160, h: 560,
        background: '#0d1117'
    });

    var menuItems = ['Overview', 'Nodes', 'Events', 'Performance', 'About'];
    var menuIds = [];
    for (var i = 0; i < menuItems.length; i++) {
        var active = (i === 0);
        var id = S.addNode({
            name: 'menu_' + i, x: 0, y: 52 + i * 38, w: 160, h: 34,
            background: active ? '#1f293780' : '#00000000',
            text: menuItems[i], fontSize: 13,
            color: active ? '#f0f6fc' : '#8b949e',
            textAlign: 'center'
        });
        menuIds.push(id);
    }

    // Sidebar highlight bar for active item
    var highlightId = S.addNode({
        name: 'highlight', x: 0, y: 52, w: 3, h: 34,
        background: '#58a6ff'
    });

    // Main content area
    S.addNode({
        name: 'content_bg', x: 160, y: 40, w: 800, h: 560,
        background: '#0d1117'
    });

    // Content header
    var headerTextId = S.addNode({
        name: 'header', x: 180, y: 56, w: 500, h: 30,
        text: 'Overview', fontSize: 22, color: '#f0f6fc', fontWeight: 'bold'
    });

    // Info cards
    var cards = [
        { title: 'Nodes', value: '0', color: '#58a6ff' },
        { title: 'Draw Calls', value: '~1', color: '#3fb950' },
        { title: 'DOM Elements', value: '0', color: '#f97316' },
        { title: 'Yoga Layout', value: 'Skipped', color: '#d2a8ff' }
    ];
    var cardValueIds = [];
    for (var ci = 0; ci < cards.length; ci++) {
        var cx = 180 + ci * 190;
        S.addNode({
            name: 'card_bg_' + ci, x: cx, y: 100, w: 170, h: 90,
            background: '#161b2280', borderRadius: 8
        });
        S.addNode({
            name: 'card_title_' + ci, x: cx + 12, y: 108, w: 146, h: 24,
            text: cards[ci].title, fontSize: 11, color: '#8b949e'
        });
        var vid = S.addNode({
            name: 'card_value_' + ci, x: cx + 12, y: 130, w: 146, h: 36,
            text: cards[ci].value, fontSize: 24, color: cards[ci].color,
            fontWeight: 'bold'
        });
        cardValueIds.push(vid);
    }

    // Interactive buttons
    var btnColors = ['#58a6ff', '#3fb950', '#f97316', '#d2a8ff', '#f778ba'];
    var btnIds = [];
    for (var bi = 0; bi < 5; bi++) {
        var bx = 180 + bi * 150;
        var bid = S.addNode({
            name: 'btn_' + bi, x: bx, y: 220, w: 130, h: 40,
            background: btnColors[bi] + '30', borderRadius: 6,
            border: btnColors[bi], borderWidth: 1,
            text: 'Button ' + (bi + 1), fontSize: 13, color: btnColors[bi],
            textAlign: 'center'
        });
        btnIds.push(bid);
    }

    // Status text at bottom
    var statusId = S.addNode({
        name: 'status', x: 180, y: 560, w: 760, h: 24,
        text: 'Click any button or menu item...', fontSize: 11, color: '#484f58'
    });

    // Animated circles area
    var circleIds = [];
    for (var ai = 0; ai < 8; ai++) {
        var acx = 250 + ai * 80;
        var acid = S.addNode({
            name: 'circle_' + ai, x: acx, y: 300, w: 50, h: 50,
            background: btnColors[ai % 5] + '40', borderRadius: 25
        });
        circleIds.push(acid);
    }

    // --- Event handlers ---
    var activeMenu = 0;
    for (var mi = 0; mi < menuIds.length; mi++) {
        (function(idx) {
            S.on(menuIds[idx], 'click', function(nodeId, x, y) {
                // Update active state
                for (var j = 0; j < menuIds.length; j++) {
                    S.set(menuIds[j], 'background', j === idx ? '#1f293780' : '#00000000');
                    S.set(menuIds[j], 'color', j === idx ? '#f0f6fc' : '#8b949e');
                }
                S.set(highlightId, 'y', 52 + idx * 38);
                S.set(headerTextId, 'text', menuItems[idx]);
                S.set(statusId, 'text', 'Switched to: ' + menuItems[idx]);
                activeMenu = idx;
            });
        })(mi);
    }

    for (var bii = 0; bii < btnIds.length; bii++) {
        (function(idx) {
            S.on(btnIds[idx], 'click', function(nodeId, x, y) {
                S.set(statusId, 'text', 'Clicked Button ' + (idx + 1) + ' at (' + Math.round(x) + ', ' + Math.round(y) + ')');
                // Flash effect: briefly change background
                S.set(btnIds[idx], 'background', btnColors[idx] + '80');
                setTimeout(function() {
                    S.set(btnIds[idx], 'background', btnColors[idx] + '30');
                }, 200);
            });
        })(bii);
    }

    // Animation loop
    var t = 0;
    setInterval(function() {
        t++;
        for (var ai = 0; ai < circleIds.length; ai++) {
            var baseY = 340 + Math.sin(t * 0.04 + ai * 0.8) * 60;
            var baseX = 250 + ai * 80 + Math.sin(t * 0.02 + ai * 1.2) * 15;
            S.set(circleIds[ai], 'y', baseY);
            S.set(circleIds[ai], 'x', baseX);
        }
        // Update node count in card
        S.set(cardValueIds[0], 'text', '' + S.count());
    }, 16);
})();
</script>
</body>
</html>
