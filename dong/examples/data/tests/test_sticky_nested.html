<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .scroll-container {
            width: 600px;
            height: 400px;
            overflow: auto;
            border: 2px solid #333;
            background: #f0f0f0;
        }
        .content {
            padding: 20px;
        }
        .block {
            height: 120px;
            margin-bottom: 20px;
            padding: 20px;
            background: #ddd;
            border: 1px solid #999;
        }
        .sticky-outer {
            position: sticky;
            top: 10px;
            background: #9C27B0;
            color: white;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #6A1B9A;
            font-weight: bold;
        }
        .sticky-inner {
            position: sticky;
            top: 50px;
            background: #FF9800;
            color: white;
            padding: 15px;
            margin-top: 15px;
            border: 2px solid #E65100;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Sticky Positioning Test - Nested</h1>
    <p>Two nested sticky elements. The outer (purple) sticks at 10px, the inner (orange) sticks at 50px.</p>

    <div class="scroll-container">
        <div class="content">
            <div class="block">Block 1 - Before stickies</div>

            <div class="sticky-outer">
                OUTER STICKY - Top: 10px
                <div class="sticky-inner">
                    INNER STICKY - Top: 50px
                </div>
            </div>

            <div class="block">Block 2</div>
            <div class="block">Block 3</div>
            <div class="block">Block 4</div>
            <div class="block">Block 5</div>
            <div class="block">Block 6</div>
        </div>
    </div>
</body>
</html>
