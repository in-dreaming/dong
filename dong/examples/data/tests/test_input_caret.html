<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: sans-serif;
    font-size: 16px;
    padding: 20px;
    background: #f0f0f0;
}
h2 { margin-bottom: 10px; }
.section {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}
label { display: block; margin-bottom: 5px; font-weight: bold; }
input[type="text"] {
    width: 300px;
    padding: 8px;
    font-size: 16px;
    border: 2px solid #888;
    border-radius: 4px;
    margin-bottom: 10px;
}
input:focus {
    border-color: #4488ff;
    outline: none;
}
textarea {
    width: 300px;
    height: 100px;
    padding: 8px;
    font-size: 16px;
    border: 2px solid #888;
    border-radius: 4px;
    resize: both;
}
textarea:focus {
    border-color: #4488ff;
    outline: none;
}
#status {
    margin-top: 10px;
    padding: 8px;
    background: #eef;
    border: 1px solid #aac;
    font-family: monospace;
    font-size: 13px;
    white-space: pre-wrap;
}
</style>
</head>
<body>
<h2>Input Caret & Selection Test</h2>

<div class="section">
    <label>1. Click to position caret, type text:</label>
    <input type="text" id="input1" value="Hello World" />
</div>

<div class="section">
    <label>2. Drag to select text (blue highlight):</label>
    <input type="text" id="input2" value="Select me with mouse drag" />
</div>

<div class="section">
    <label>3. Shift+Arrow / Ctrl+A / Home / End:</label>
    <input type="text" id="input3" value="Keyboard selection test" />
</div>

<div class="section">
    <label>4. Textarea - Enter for newline:</label>
    <textarea id="textarea1">Type here.
Press Enter for new lines.</textarea>
</div>

<div class="section">
    <label>5. Empty input with placeholder:</label>
    <input type="text" id="input4" placeholder="Click here and type..." />
</div>

<div id="status">Status: Ready. Click an input to test caret.</div>

<script>
var status = document.getElementById('status');
var inputs = ['input1', 'input2', 'input3', 'input4', 'textarea1'];
for (var i = 0; i < inputs.length; i++) {
    var el = document.getElementById(inputs[i]);
    if (el) {
        el.addEventListener('focus', function(e) {
            status.textContent = 'Focused: ' + e.target.id + ' | value: "' + e.target.value + '"';
        });
        el.addEventListener('input', function(e) {
            status.textContent = 'Input on: ' + e.target.id + ' | value: "' + e.target.value + '"';
        });
    }
}
</script>
</body>
</html>
