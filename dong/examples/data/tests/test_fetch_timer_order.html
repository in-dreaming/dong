<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: sans-serif; padding: 20px; }
#result { margin-top: 10px; padding: 10px; border: 1px solid #ccc; min-height: 60px; background: #f9f9f9;
          white-space: pre-wrap; font-size: 14px; }
</style>
</head>
<body>
<h2>Fetch + Timer + Microtask Order Test</h2>
<div id="result">Running...</div>

<script>
var result = document.getElementById('result');
var log = [];

Promise.resolve().then(function() {
    log.push('1:microtask');
});

fetch('test_fetch_local.txt')
    .then(function(r) { return r.text(); })
    .then(function() {
        log.push('3:fetch-resolved');
        result.textContent = log.join('\n');
    });

setTimeout(function() {
    log.push('2:timeout');
}, 0);
</script>
</body>
</html>
