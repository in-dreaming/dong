<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #0b0f17;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 760px;
      padding: 24px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 18px 60px rgba(0,0,0,0.55);
    }

    .row {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
    }

    .item {
      width: 120px;
      height: 84px;
      border-radius: 14px;
      background: rgb(70, 70, 85);
      border: 3px solid rgba(255,255,255,0.20);
    }

    .legend {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      opacity: 0.9;
    }

    .dot { width: 10px; height: 10px; border-radius: 999px; margin-top: 6px; }
    .label { color: rgba(255,255,255,0.85); font-size: 14px; line-height: 1.2; }

    .g { background: rgb(80, 220, 140); }
    .b { background: rgb(0, 128, 255); }
    .y { background: rgb(245, 170, 60); }
  </style>
</head>
<body>
  <div class="card" id="root">
    <div class="row" data-row="1">
      <div class="item" data-k="x"></div>
      <div class="item" data-k="y"></div>
      <div class="item" data-k="x"></div>
      <div class="item" data-k="z"></div>
    </div>
    <div class="row" data-row="2">
      <div class="item" data-k="z"></div>
      <div class="item" data-k="x"></div>
      <div class="item" data-k="y"></div>
      <div class="item" data-k="z"></div>
    </div>

    <div class="legend">
      <div class="dot g"></div><div class="label">attribute selector: <code>[data-k="x"]</code></div>
      <div class="dot b"></div><div class="label">child + nth-child: <code>.row>.item:nth-child(2)</code></div>
      <div class="dot y"></div><div class="label">adjacent sibling: <code>[data-k="y"]+.item</code></div>
    </div>
  </div>

  <script>
    // 1) Attribute selector
    var xs = document.querySelectorAll('.row>.item[data-k="x"]');
    for (var i = 0; i < xs.length; i++) {
      xs[i].style.backgroundColor = 'rgb(80, 220, 140)';
    }

    // 2) Child combinator + nth-child
    var second = document.querySelectorAll('.row>.item:nth-child(2)');
    for (var j = 0; j < second.length; j++) {
      second[j].style.backgroundColor = 'rgb(0, 128, 255)';
    }

    // 3) Adjacent sibling combinator
    var afterY = document.querySelectorAll('[data-k="y"]+.item');
    for (var k = 0; k < afterY.length; k++) {
      afterY[k].style.backgroundColor = 'rgb(245, 170, 60)';
    }
  </script>
</body>
</html>
