<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: sans-serif; padding: 20px; }
#editor {
    border: 2px solid #666;
    padding: 16px;
    min-height: 150px;
    margin: 10px 0;
    font-size: 18px;
    line-height: 1.6;
    caret-color: red;
}
#editor:focus {
    border-color: #0066cc;
    outline: none;
}
#log { margin-top: 10px; padding: 10px; border: 1px solid #ccc; min-height: 80px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
</style>
</head>
<body>
<h2>ContentEditable Typing Test</h2>
<p>Click the editor below and test:</p>
<ul>
    <li>Type text normally</li>
    <li>Press Backspace to delete backwards</li>
    <li>Press Delete to delete forwards</li>
    <li>Press Enter to insert a line break</li>
</ul>

<div id="editor" contenteditable="true">Type here...</div>

<div id="log"></div>

<script>
var log = document.getElementById('log');
var editor = document.getElementById('editor');

function addLog(msg) {
    log.textContent += msg + '\n';
}

editor.addEventListener('keydown', function(e) {
    addLog('keydown: ' + e.key + ' (code: ' + e.keyCode + ')');
});

editor.addEventListener('input', function(e) {
    addLog('input event fired');
    addLog('  content: ' + editor.textContent.substring(0, 50) + (editor.textContent.length > 50 ? '...' : ''));
});

// Test contentEditable property manipulation
addLog('Initial contentEditable: ' + editor.contentEditable);
addLog('Initial isContentEditable: ' + editor.isContentEditable);

// Test setting contentEditable
editor.contentEditable = 'false';
addLog('After set false: ' + editor.contentEditable + ', isContentEditable: ' + editor.isContentEditable);

editor.contentEditable = 'true';
addLog('After set true: ' + editor.contentEditable + ', isContentEditable: ' + editor.isContentEditable);

addLog('\nTyping test ready. Click the editor and start typing.');
</script>
</body>
</html>
