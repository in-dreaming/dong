<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .result {
            font-size: 18px;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .success { background-color: #4CAF50; color: white; }
        .error { background-color: #f44336; color: white; }
    </style>
</head>
<body>
    <h1>Simple Image Event Test</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');
        let log = [];

        function addLog(msg, success) {
            log.push(msg);
            const div = document.createElement('div');
            div.className = 'result ' + (success ? 'success' : 'error');
            div.textContent = msg;
            results.appendChild(div);
        }

        // Test: Create img element and set src
        const img = document.createElement('img');

        img.addEventListener('load', function(e) {
            addLog('✓ LOAD event fired! Type: ' + e.type, true);
        });

        img.addEventListener('error', function(e) {
            addLog('✓ ERROR event fired! Type: ' + e.type, true);
        });

        addLog('Setting img.src to valid path...', false);
        img.src = '../images/bg.png';

        // Test 2: Empty src (should trigger error)
        setTimeout(function() {
            const img2 = document.createElement('img');
            img2.addEventListener('load', function(e) {
                addLog('✗ LOAD fired for empty src (unexpected)', false);
            });
            img2.addEventListener('error', function(e) {
                addLog('✓ ERROR event fired for empty src! Type: ' + e.type, true);
            });

            addLog('Setting img2.src to empty string...', false);
            img2.src = '';
        }, 500);

        setTimeout(function() {
            addLog('Test completed. Check results above.', false);
        }, 1500);
    </script>
</body>
</html>
