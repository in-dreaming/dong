<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: sans-serif; padding: 20px; }
#result { margin-top: 10px; padding: 10px; border: 1px solid #ccc; min-height: 40px; background: #f9f9f9; }
.pass { color: green; font-weight: bold; }
.fail { color: red; font-weight: bold; }
</style>
</head>
<body>
<h2>fetch() Rejection Test</h2>
<div id="result">Loading...</div>

<script>
var result = document.getElementById('result');

fetch('nonexistent_file_xyz.txt')
    .then(function(response) {
        result.textContent = 'FAIL: fetch should have rejected but got response';
        result.className = 'fail';
    })
    .catch(function(err) {
        if (typeof err === 'string' && err.length > 0) {
            result.textContent = 'PASS: fetch correctly rejected: ' + err;
            result.className = 'pass';
        } else {
            result.textContent = 'FAIL: rejection error is empty or wrong type';
            result.className = 'fail';
        }
    });
</script>
</body>
</html>
