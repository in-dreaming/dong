<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a2e;
            color: #eaeaea;
            font-family: Arial, sans-serif;
        }
        .section {
            background-color: #16213e;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 16px;
            color: #e94560;
            margin-bottom: 12px;
        }
        .demo-row {
            margin-bottom: 12px;
        }
        .demo-item {
            display: inline-block;
            min-width: 160px;
            min-height: 40px;
            margin: 6px 10px 6px 0;
            padding: 12px 18px;
            background-color: #0b1f3f;
            border: 1px solid rgba(0, 212, 255, 0.45);
            border-radius: 8px;
            color: #ffffff;
            text-align: left;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1.2;
            vertical-align: top;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
        }
        .outline-solid {
            outline: 3px solid #00d4ff;
        }
        .outline-dashed {
            outline: 2px dashed #e94560;
        }
        .outline-dotted {
            outline: 2px dotted #7b2cbf;
        }
        .outline-offset {
            outline: 3px solid #00ff88;
            outline-offset: 5px;
        }
        .outline-thick {
            outline: 5px solid #ff6b35;
            outline-offset: 3px;
        }
    </style>
</head>
<body>
    <div class="section">
        <div class="section-title">CSS Outline Property Test</div>
        <div class="demo-row">
            <div class="demo-item outline-solid">Solid Outline</div>
            <div class="demo-item outline-dashed">Dashed Outline</div>
            <div class="demo-item outline-dotted">Dotted Outline</div>
        </div>
        <div class="demo-row">
            <div class="demo-item outline-offset">With Offset (5px)</div>
            <div class="demo-item outline-thick">Thick (5px) + Offset</div>
        </div>
    </div>
    <div class="section">
        <div class="section-title">Note</div>
        <div>Outline is drawn outside the border and does not affect layout.</div>
    </div>
</body>
</html>
