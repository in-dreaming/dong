<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>test_css_accent_color</title>
  <style>
    body { font-family: Arial; margin: 24px; }
    .row { display: flex; gap: 28px; align-items: flex-start; }
    .box { width: 360px; }
    .label { font-size: 14px; margin-bottom: 10px; color: #333; }
    .item { display: flex; gap: 12px; align-items: center; margin: 10px 0; }
    .name { width: 90px; font-size: 13px; color: #333; }
    input[type="checkbox"], input[type="radio"] { width: 22px; height: 22px; }
    .accent input { accent-color: #e60012; border: 3px solid #e60012; }
    .green input { accent-color: #00c853; border: 3px solid #00c853; }
  </style>
</head>
<body>
  <div class="row">
    <div class="box">
      <div class="label">default</div>
      <div class="item"><div class="name">checkbox</div><input type="checkbox" checked /></div>
      <div class="item"><div class="name">radio</div><input type="radio" checked /></div>
    </div>
    <div class="box accent">
      <div class="label">accent-color: #e60012</div>
      <div class="item"><div class="name">checkbox</div><input type="checkbox" checked /></div>
      <div class="item"><div class="name">radio</div><input type="radio" checked /></div>
    </div>
    <div class="box green">
      <div class="label">accent-color: #00c853</div>
      <div class="item"><div class="name">checkbox</div><input type="checkbox" checked /></div>
      <div class="item"><div class="name">radio</div><input type="radio" checked /></div>
    </div>
  </div>
</body>
</html>
