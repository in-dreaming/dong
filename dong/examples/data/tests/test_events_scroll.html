<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
<style>
  body { font-size: 16px; padding: 20px; }
  #scrollable {
    width: 300px;
    height: 200px;
    overflow: auto;
    background: lightblue;
    padding: 10px;
  }
  .content {
    height: 800px;
    background: linear-gradient(lightblue, darkblue);
  }
  #result { margin-top: 20px; padding: 10px; background: #eee; white-space: pre; font-family: monospace; }
</style>
</head>
<body>
  <div id="scrollable">
    <div class="content">Scroll me! (800px tall content in 200px container)</div>
  </div>
  <div id="result"></div>
  <script>
    var r = '';
    var scrollable = document.getElementById('scrollable');

    scrollable.addEventListener('scroll', function() {
      r += 'scroll event fired!\n';
      document.getElementById('result').textContent = r;
    });

    r += 'Scroll event test loaded\n';
    r += 'Scroll the blue box to trigger events\n';
    document.getElementById('result').textContent = r;
    console.log('Events scroll test loaded');
  </script>
</body>
</html>
