<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>test_css_will_change</title>
  <style>
    body { font-family: Arial; margin: 24px; }
    .row { display: flex; gap: 24px; }
    .box { width: 360px; }
    .label { font-size: 14px; margin-bottom: 10px; color: #333; }
    .card { width: 240px; height: 80px; border-radius: 10px; background: #4A90E2; color: #fff; padding: 10px; }
    .wc { will-change: transform; }
  </style>
</head>
<body>
  <div class="row">
    <div class="box">
      <div class="label">no will-change</div>
      <div class="card">card</div>
    </div>
    <div class="box">
      <div class="label">will-change: transform</div>
      <div class="card wc">card</div>
    </div>
  </div>
</body>
</html>
