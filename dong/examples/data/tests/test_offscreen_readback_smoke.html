<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Offscreen readback smoke</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #fff; }
    .row { display: flex; gap: 12px; padding: 24px; }
    .box { width: 160px; height: 120px; border-radius: 12px; border: 2px solid #222; }
    .r { background: #ff2d2d; }
    .g { background: #1fd655; }
    .b { background: #2d6bff; }
    .t { font: 700 28px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color: #111; }
    .small { font: 400 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color: #444; padding: 0 24px; }
  </style>
</head>
<body>
  <div class="row">
    <div class="box r"></div>
    <div class="box g"></div>
    <div class="box b"></div>
  </div>
  <div class="t" style="padding: 0 24px;">Readback should be stable (no noise)</div>
  <div class="small">If the middle column (dong frame) becomes colored noise, the GPU readback path is broken.</div>
</body>
</html>
