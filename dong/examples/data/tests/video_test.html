<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #0b0f14;
      color: #e6eefc;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .row {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .card {
      width: 360px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .title {
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 10px;
    }
    video {
      width: 320px;
      height: 180px;
      object-fit: cover;
      background: #0f1115;
    }
  </style>
</head>
<body>
  <div class="row">
    <div class="card">
      <div class="title">video with poster</div>
      <video controls poster="../images/bg.png"></video>

    </div>

    <div class="card">
      <div class="title">video without poster (should show placeholder)</div>
      <video controls></video>

    </div>
  </div>
</body>
</html>
