<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
<style>
body {
    font-family: sans-serif;
    font-size: 16px;
    padding: 20px;
    background: #f0f0f0;
}
.section {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}
.editable {
    min-height: 60px;
    padding: 10px;
    border: 2px solid #888;
    border-radius: 4px;
    font-size: 16px;
    line-height: 1.4;
}
.editable:focus {
    border-color: #4488ff;
    outline: none;
}
label { display: block; margin-bottom: 5px; font-weight: bold; }
button {
    padding: 6px 14px;
    margin: 4px;
    font-size: 14px;
    cursor: pointer;
}
#log {
    margin-top: 10px;
    padding: 8px;
    background: #111;
    color: #0f0;
    font-family: monospace;
    font-size: 12px;
    height: 80px;
    overflow: auto;
    white-space: pre;
}
</style>
</head>
<body>
<h3>ContentEditable: Mixed Text + Multiline Test</h3>

<div class="section">
    <label>Bug 1 test: English + Chinese mixed text (select some text then click Bold)</label>
    <div class="editable" contenteditable="true" id="e1">Hello World 你好世界 Test</div>
    <button onclick="document.execCommand('bold')">Bold</button>
    <button onclick="document.execCommand('italic')">Italic</button>
</div>

<div class="section">
    <label>Bug 2 test: Press Enter to create multiple lines, then click on line 2</label>
    <div class="editable" contenteditable="true" id="e2">Type here and press Enter</div>
</div>

<div id="log">Ready. Test steps:
1. In box 1: select "你好" with mouse, then click Bold
2. In box 2: click at end, press Enter, type "second line", click on it</div>

<script>
var log = document.getElementById('log');
function addLog(msg) {
    log.textContent += '\n' + msg;
    log.scrollTop = log.scrollHeight;
}
document.addEventListener('selectionchange', function() {
    var sel = window.getSelection();
    if (sel && sel.rangeCount > 0) {
        var r = sel.getRangeAt(0);
        addLog('sel: "' + sel.toString().substring(0, 30) + '" collapsed=' + sel.isCollapsed);
    }
});
</script>
</body>
</html>
