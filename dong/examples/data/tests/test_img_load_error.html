<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
        }
        .status {
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 3px;
            display: inline-block;
            margin: 5px 0;
        }
        .success {
            background-color: #4CAF50;
            color: white;
        }
        .error {
            background-color: #f44336;
            color: white;
        }
        .pending {
            background-color: #ff9800;
            color: white;
        }
        img {
            border: 2px solid #333;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Image Load/Error Events Test</h1>

    <div class="test-section">
        <h2>Test 1: Load Event (Valid Image)</h2>
        <p>Status: <span id="test1-status" class="status pending">Pending</span></p>
        <img id="test1-img" width="100" height="100" />
        <p id="test1-detail"></p>
    </div>

    <div class="test-section">
        <h2>Test 2: Error Event (Empty src)</h2>
        <p>Status: <span id="test2-status" class="status pending">Pending</span></p>
        <img id="test2-img" width="100" height="100" />
        <p id="test2-detail"></p>
    </div>

    <div class="test-section">
        <h2>Test 3: Load Event (Setting src via JS)</h2>
        <p>Status: <span id="test3-status" class="status pending">Pending</span></p>
        <img id="test3-img" width="100" height="100" />
        <p id="test3-detail"></p>
    </div>

    <div class="test-section">
        <h2>Test 4: Error Event (Invalid src via JS)</h2>
        <p>Status: <span id="test4-status" class="status pending">Pending</span></p>
        <img id="test4-img" width="100" height="100" />
        <p id="test4-detail"></p>
    </div>

    <div class="test-section">
        <h2>Summary</h2>
        <p id="summary"></p>
    </div>

    <script>
        let testResults = {
            test1: false,
            test2: false,
            test3: false,
            test4: false
        };

        function updateSummary() {
            const passed = Object.values(testResults).filter(v => v).length;
            const total = Object.keys(testResults).length;
            document.getElementById('summary').textContent =
                `Passed: ${passed}/${total} tests`;
        }

        function markTest(testNum, success, detail) {
            const statusEl = document.getElementById(`test${testNum}-status`);
            const detailEl = document.getElementById(`test${testNum}-detail`);

            statusEl.textContent = success ? 'PASSED' : 'FAILED';
            statusEl.className = 'status ' + (success ? 'success' : 'error');
            detailEl.textContent = detail;

            testResults[`test${testNum}`] = success;
            updateSummary();
        }

        // Test 1: Load event with valid image path
        const img1 = document.getElementById('test1-img');
        img1.addEventListener('load', function(e) {
            markTest(1, true, `Load event fired. Event type: ${e.type}`);
        });
        img1.addEventListener('error', function(e) {
            markTest(1, false, `Error event fired unexpectedly. Event type: ${e.type}`);
        });
        // Use a relative path that should exist
        img1.src = '../images/bg.png';

        // Test 2: Error event with empty src
        const img2 = document.getElementById('test2-img');
        img2.addEventListener('load', function(e) {
            markTest(2, false, `Load event fired unexpectedly. Event type: ${e.type}`);
        });
        img2.addEventListener('error', function(e) {
            markTest(2, true, `Error event fired as expected. Event type: ${e.type}`);
        });
        img2.src = '';

        // Test 3: Load event set via JavaScript
        const img3 = document.getElementById('test3-img');
        img3.addEventListener('load', function(e) {
            markTest(3, true, `Load event fired. Event type: ${e.type}, Target: ${e.target ? e.target.tagName : 'null'}`);
        });
        img3.addEventListener('error', function(e) {
            markTest(3, false, `Error event fired unexpectedly. Event type: ${e.type}`);
        });
        // Set src after listener is attached
        setTimeout(function() {
            img3.src = '../images/bg.png';
        }, 100);

        // Test 4: Error event with empty src set via JS
        const img4 = document.getElementById('test4-img');
        img4.addEventListener('load', function(e) {
            markTest(4, false, `Load event fired unexpectedly. Event type: ${e.type}`);
        });
        img4.addEventListener('error', function(e) {
            markTest(4, true, `Error event fired as expected. Event type: ${e.type}, Target: ${e.target ? e.target.tagName : 'null'}`);
        });
        setTimeout(function() {
            img4.src = '';
        }, 100);

        // Set fallback timeout in case events don't fire
        setTimeout(function() {
            for (let i = 1; i <= 4; i++) {
                const statusEl = document.getElementById(`test${i}-status`);
                if (statusEl.textContent === 'Pending') {
                    markTest(i, false, 'Timeout: Event did not fire within expected time');
                }
            }
        }, 2000);
    </script>
</body>
</html>
