<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>test_css_caption_side</title>
  <style>
    body { font-family: Arial; margin: 24px; }
    .row { display: flex; gap: 28px; align-items: flex-start; }
    .box { width: 360px; }
    .label { font-size: 14px; margin-bottom: 8px; color: #333; }
    table { border: 2px solid #333; border-collapse: collapse; width: 320px; }
    td, th { border: 1px solid #777; padding: 6px 8px; }
    caption { padding: 6px 8px; font-weight: bold; background: #f0f0f0; }
    .bottom caption { caption-side: bottom; }
  </style>
</head>
<body>
  <div class="row">
    <div class="box">
      <div class="label">caption-side: top (default)</div>
      <table>
        <caption>CAPTION TOP</caption>
        <tr><th>A</th><th>B</th></tr>
        <tr><td>1</td><td>2</td></tr>
      </table>
    </div>
    <div class="box bottom">
      <div class="label">caption-side: bottom</div>
      <table>
        <caption>CAPTION BOTTOM</caption>
        <tr><th>A</th><th>B</th></tr>
        <tr><td>1</td><td>2</td></tr>
      </table>
    </div>
  </div>
</body>
</html>
