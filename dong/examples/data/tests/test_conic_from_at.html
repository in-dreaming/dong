<!DOCTYPE html>
<!-- porffor: ready -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>P0-3 conic-gradient from+at offset</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #1a1a2e;
      color: #eee;
      font-family: system-ui, sans-serif;
    }
    .container {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .box {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 2px solid #444;
    }
    .from-45 {
      background: conic-gradient(from 45deg, red, yellow, green, blue, red);
    }
    .from-90 {
      background: conic-gradient(from 90deg, #ff6b6b, #feca57, #48dbfb, #ff6b6b);
    }
    .at-offset {
      background: conic-gradient(from 0deg at 70% 30%, #667eea, #764ba2, #667eea);
    }
    label {
      display: block;
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <p>Conic gradient with from angle and at position offsets</p>
  <div class="container">
    <div>
      <div class="box from-45"></div>
      <label>from 45deg</label>
    </div>
    <div>
      <div class="box from-90"></div>
      <label>from 90deg</label>
    </div>
    <div>
      <div class="box at-offset"></div>
      <label>at 70% 30%</label>
    </div>
  </div>
</body>
</html>
