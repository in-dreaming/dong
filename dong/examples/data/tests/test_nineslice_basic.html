<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; padding: 24px; background: #1a1a2e; }
.panel {
  width: 300px;
  height: 200px;
  padding: 20px;
  color: white;
  font-family: sans-serif;
  border: 24px solid transparent;
  border-image-source: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAO0lEQVR42u3WMQ0AIAwAwSphrkTE4qWYaAKEG36/8aMy62QBAHAtYKzZGgAAAAAAAAAAwHsAVwzwDWADLslvOPzc32sAAAAASUVORK5CYII=");
  border-image-slice: 6 fill;
  border-image-width: 24px;
  border-image-repeat: stretch;
  background: rgba(12, 16, 36, 0.75);
}
.panel-shorthand {
  width: 300px;
  height: 150px;
  margin-top: 20px;
  padding: 20px;
  color: white;
  font-family: sans-serif;
  border: 24px solid transparent;
  border-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAO0lEQVR42u3WMQ0AIAwAwSphrkTE4qWYaAKEG36/8aMy62QBAHAtYKzZGgAAAAAAAAAAwHsAVwzwDWADLslvOPzc32sAAAAASUVORK5CYII=") 6 fill / 24px stretch;
  background: rgba(10, 14, 30, 0.75);
}
.panel-repeat {
  width: 300px;
  height: 150px;
  margin-top: 20px;
  padding: 20px;
  color: white;
  font-family: sans-serif;
  border: 18px solid transparent;
  border-image-source: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAO0lEQVR42u3WMQ0AIAwAwSphrkTE4qWYaAKEG36/8aMy62QBAHAtYKzZGgAAAAAAAAAAwHsAVwzwDWADLslvOPzc32sAAAAASUVORK5CYII=");
  border-image-slice: 6 fill;
  border-image-width: 18px;
  border-image-repeat: repeat round;
  background: rgba(8, 12, 24, 0.8);
}
</style>
</head>
<body>
<div class="panel">
  <h2>Nine-Slice Panel</h2>
  <p>This panel uses border-image for game UI styling.</p>
</div>
<div class="panel-shorthand">
  <h2>Shorthand Panel</h2>
  <p>Uses border-image shorthand property.</p>
</div>
<div class="panel-repeat">
  <h2>Repeat Panel</h2>
  <p>Uses repeat/round border-image-repeat.</p>
</div>
</body>
</html>
