<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
<style>
  body { font-size: 16px; padding: 20px; }
  #target { padding: 20px; background: lightyellow; border: 2px solid orange; min-height: 60px; }
  #result { margin-top: 20px; padding: 10px; background: #eee; white-space: pre; font-family: monospace; }
</style>
</head>
<body>
  <div id="target" tabindex="0">Click and hold a key</div>
  <div id="result"></div>
  <script>
    var r = '';
    var target = document.getElementById('target');
    var keyCount = {};

    target.addEventListener('keydown', function(e) {
      var keyStr = e.key;
      if (!keyCount[keyStr]) {
        keyCount[keyStr] = 0;
      }
      keyCount[keyStr]++;

      r += 'keydown #' + keyCount[keyStr] + ':\n';
      r += '  key="' + e.key + '"\n';
      r += '  repeat=' + e.repeat + '\n';
      r += '  isTrusted=' + e.isTrusted + '\n';

      if (e.repeat) {
        r += '  >>> REPEAT EVENT <<<\n';
      }
      document.getElementById('result').textContent = r;
    });

    target.addEventListener('keyup', function(e) {
      r += 'keyup:\n';
      r += '  key="' + e.key + '"\n';
      r += '  repeat=' + e.repeat + '\n';
      r += '  isTrusted=' + e.isTrusted + '\n';
      r += '  >>> KEY RELEASED <<<\n\n';
      keyCount[e.key] = 0;
      document.getElementById('result').textContent = r;
    });

    r += 'KeyboardEvent repeat test loaded\n';
    r += 'Click and hold any key to see repeat events\n';
    r += 'The first keydown has repeat=false\n';
    r += 'Subsequent keydowns have repeat=true\n';
    r += 'keyup has repeat=false\n';
    document.getElementById('result').textContent = r;
    console.log('KeyboardEvent repeat test loaded');
  </script>
</body>
</html>
