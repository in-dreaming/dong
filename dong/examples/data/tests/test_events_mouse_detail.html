<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
<style>
  body { font-size: 16px; padding: 20px; }
  #target { width: 300px; height: 200px; background: lightcoral; padding: 10px; }
  #result { margin-top: 20px; padding: 10px; background: #eee; white-space: pre; font-family: monospace; }
</style>
</head>
<body>
  <div id="target">Click me to see mouse event details</div>
  <div id="result"></div>
  <script>
    var r = '';
    var target = document.getElementById('target');

    target.addEventListener('click', function(e) {
      r += 'click:\n';
      r += '  clientX=' + e.clientX + ' clientY=' + e.clientY + '\n';
      r += '  offsetX=' + e.offsetX + ' offsetY=' + e.offsetY + '\n';
      r += '  button=' + e.button + '\n';
      r += '  altKey=' + e.altKey + ' ctrlKey=' + e.ctrlKey + '\n';
      r += '  shiftKey=' + e.shiftKey + ' metaKey=' + e.metaKey + '\n';
      document.getElementById('result').textContent = r;
    });

    r += 'MouseEvent detail test loaded\n';
    r += 'Click the red box to see event properties\n';
    document.getElementById('result').textContent = r;
    console.log('Events mouse detail test loaded');
  </script>
</body>
</html>
