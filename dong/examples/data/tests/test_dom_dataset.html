<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
<style>
  body { font-size: 16px; padding: 20px; }
  #result { margin-top: 20px; padding: 10px; background: #eee; white-space: pre; font-family: monospace; }
</style>
</head>
<body>
  <div id="testEl" data-user-name="Alice" data-item-count="42" data-active="true">Test Element</div>
  <div id="result"></div>
  <script>
    var r = '';
    var el = document.getElementById('testEl');

    // Read dataset
    r += 'dataset.userName: ' + (el.dataset.userName === 'Alice' ? 'PASS' : 'FAIL (' + el.dataset.userName + ')') + '\n';
    r += 'dataset.itemCount: ' + (el.dataset.itemCount === '42' ? 'PASS' : 'FAIL (' + el.dataset.itemCount + ')') + '\n';
    r += 'dataset.active: ' + (el.dataset.active === 'true' ? 'PASS' : 'FAIL (' + el.dataset.active + ')') + '\n';

    // Write dataset
    el.dataset.newProp = 'hello';
    r += 'dataset.newProp set: ' + (el.getAttribute('data-new-prop') === 'hello' ? 'PASS' : 'FAIL (' + el.getAttribute('data-new-prop') + ')') + '\n';

    // Read back written value
    r += 'dataset.newProp read back: ' + (el.dataset.newProp === 'hello' ? 'PASS' : 'FAIL') + '\n';

    document.getElementById('result').textContent = r;
    console.log('Dataset test loaded');
  </script>
</body>
</html>
