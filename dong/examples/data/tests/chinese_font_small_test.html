<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
    <meta charset="utf-8">
    <title>Chinese Small Fonts - 小字体测试</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: #10b981;
            color: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .header h1 { margin: 0; font-size: 20px; }
        .header p { margin: 4px 0 0 0; font-size: 12px; opacity: 0.9; }
        
        .row {
            display: flex;
            align-items: center;
            background: white;
            margin-bottom: 10px;
            padding: 14px 16px;
            border-radius: 6px;
            border-left: 3px solid #10b981;
        }
        .label {
            width: 60px;
            font-size: 12px;
            color: #666;
        }
        .text { flex: 1; }
        
        .size-13px { font-size: 13px; }
        .size-14px { font-size: 14px; }
        .size-15px { font-size: 15px; }
        .size-16px { font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>小字体测试 Small Fonts (13px-16px)</h1>
        <p>常用UI字体尺寸测试</p>
    </div>
    
    <div class="row">
        <div class="label">13px</div>
        <div class="text size-13px">中文测试 Chinese 13px紧凑 · 菜单文字</div>
    </div>
    <div class="row">
        <div class="label">14px</div>
        <div class="text size-14px">中文测试 Chinese 14px标准 · 正文内容</div>
    </div>
    <div class="row">
        <div class="label">15px</div>
        <div class="text size-15px">中文测试 Chinese 15px舒适 · 阅读文本</div>
    </div>
    <div class="row">
        <div class="label">16px</div>
        <div class="text size-16px">中文测试 Chinese 16px清晰 · 默认字号</div>
    </div>
</body>
</html>
