<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: sans-serif; padding: 20px; }
button { padding: 8px 16px; margin: 5px; cursor: pointer; }
dialog { max-width: 400px; }
dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
#log { margin-top: 10px; padding: 10px; border: 1px solid #ccc; min-height: 50px; }
</style>
</head>
<body>
<h2>Dialog Modal Test</h2>

<button id="open-btn">Open Modal Dialog</button>
<button id="normal-btn" onclick="addLog('Normal button clicked')">Normal Button</button>

<dialog id="my-dialog">
    <h3>Modal Dialog</h3>
    <p>This is a modal dialog. Press Escape or click Close to dismiss.</p>
    <input id="dialog-input" type="text" placeholder="Type here (focus trapped)">
    <br><br>
    <button id="close-btn">Close</button>
    <button id="close-with-value">Close with value</button>
</dialog>

<div id="log"></div>

<script>
var dialog = document.getElementById('my-dialog');
var log = document.getElementById('log');

function addLog(msg) {
    log.textContent += msg + '\n';
}

document.getElementById('open-btn').addEventListener('click', function() {
    dialog.showModal();
    addLog('Dialog opened (modal)');
});

document.getElementById('close-btn').addEventListener('click', function() {
    dialog.close();
    addLog('Dialog closed');
});

document.getElementById('close-with-value').addEventListener('click', function() {
    dialog.close('confirmed');
    addLog('Dialog closed with returnValue: ' + dialog.returnValue);
});

dialog.addEventListener('close', function() {
    addLog('close event fired, returnValue: ' + dialog.returnValue);
});

dialog.addEventListener('cancel', function() {
    addLog('cancel event fired (Escape pressed)');
});

addLog('Dialog test ready');
</script>
</body>
</html>
