<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
<style>
body { font-family: sans-serif; padding: 10px; }
#editor {
    border: 2px solid #333;
    padding: 16px;
    min-height: 60px;
    margin: 10px 0;
    font-size: 16px;
}
#log { margin-top: 10px; padding: 10px; border: 1px solid #ccc; min-height: 200px; font-family: monospace; font-size: 11px; white-space: pre-wrap; overflow-y: auto; }
button { margin: 4px; padding: 6px 12px; }
</style>
</head>
<body data-porffor-module="t20_ce_simulate">
<h3>CE Simulate Interactive Test</h3>

<div>
    <button onclick="document.execCommand('bold')">Bold</button>
    <button onclick="document.execCommand('italic')">Italic</button>
    <button onclick="document.execCommand('underline')">Underline</button>
    <button onclick="testSelectAll()">Select All</button>
</div>

<div id="editor" contenteditable="true">Hello World Test</div>

<div id="log"></div>

<script>
var log = document.getElementById('log');
var editor = document.getElementById('editor');

function addLog(msg) {
    log.textContent += msg + '\n';
    console.log('[CE-SIM] ' + msg);
}

function testSelectAll() {
    document.execCommand('selectAll');
    addLog('selectAll executed');
}

// Simulate: focus editor, selectAll, then try each command
(function() {
    addLog('=== Simulating interactive flow ===');

    // Step 1: Focus editor
    editor.focus();
    addLog('editor focused');

    // Step 2: Select all text
    document.execCommand('selectAll');
    addLog('selectAll done');

    // Step 3: Test bold
    var r = document.execCommand('bold');
    addLog('bold result: ' + r + ' => ' + editor.innerHTML);

    // Step 4: Reset and test italic
    editor.innerHTML = 'Hello World Test';
    addLog('--- reset ---');
    document.execCommand('selectAll');
    r = document.execCommand('italic');
    addLog('italic result: ' + r + ' => ' + editor.innerHTML);

    // Step 5: Reset and test underline
    editor.innerHTML = 'Hello World Test';
    addLog('--- reset ---');
    document.execCommand('selectAll');
    r = document.execCommand('underline');
    addLog('underline result: ' + r + ' => ' + editor.innerHTML);

    // Step 6: Reset and test bold->italic in sequence
    editor.innerHTML = 'Hello World Test';
    addLog('--- reset ---');
    addLog('=== Test bold then italic ===');
    document.execCommand('selectAll');
    r = document.execCommand('bold');
    addLog('bold: ' + r + ' => ' + editor.innerHTML);
    document.execCommand('selectAll');
    r = document.execCommand('italic');
    addLog('italic after bold: ' + r + ' => ' + editor.innerHTML);

    addLog('=== All simulate tests done ===');
})();
</script>
</body>
</html>
