<!DOCTYPE html>
<html>
<head>
<style>
  body { font-size: 16px; padding: 20px; }
  input { padding: 5px; margin: 5px; font-size: 14px; }
  #result { margin-top: 20px; padding: 10px; background: #eee; white-space: pre; font-family: monospace; }
</style>
</head>
<body>
  <div>
    <input type="text" id="t1" value="hello" name="username">
    <input type="checkbox" id="t2" checked>
    <input type="text" id="t3" disabled value="disabled">
    <input type="password" id="t4" value="secret">
  </div>
  <div id="result"></div>
  <script>
    var r = '';
    var t1 = document.getElementById('t1');
    var t2 = document.getElementById('t2');
    var t3 = document.getElementById('t3');
    var t4 = document.getElementById('t4');

    // value property
    r += 't1.value: ' + (t1.value === 'hello' ? 'PASS' : 'FAIL (' + t1.value + ')') + '\n';
    t1.value = 'world';
    r += 't1.value after set: ' + (t1.value === 'world' ? 'PASS' : 'FAIL (' + t1.value + ')') + '\n';

    // checked property
    r += 't2.checked: ' + (t2.checked === true ? 'PASS' : 'FAIL') + '\n';
    t2.checked = false;
    r += 't2.checked after unset: ' + (t2.checked === false ? 'PASS' : 'FAIL') + '\n';

    // disabled property
    r += 't3.disabled: ' + (t3.disabled === true ? 'PASS' : 'FAIL') + '\n';
    t3.disabled = false;
    r += 't3.disabled after unset: ' + (t3.disabled === false ? 'PASS' : 'FAIL') + '\n';

    // type property
    r += 't1.type: ' + (t1.type === 'text' ? 'PASS' : 'FAIL (' + t1.type + ')') + '\n';
    r += 't4.type: ' + (t4.type === 'password' ? 'PASS' : 'FAIL (' + t4.type + ')') + '\n';

    // name property
    r += 't1.name: ' + (t1.name === 'username' ? 'PASS' : 'FAIL (' + t1.name + ')') + '\n';
    t1.name = 'login';
    r += 't1.name after set: ' + (t1.name === 'login' ? 'PASS' : 'FAIL (' + t1.name + ')') + '\n';

    document.getElementById('result').textContent = r;
    console.log('Input properties test loaded');
  </script>
</body>
</html>
