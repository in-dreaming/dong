<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: sans-serif; padding: 20px; }
#editor { border: 2px solid #333; padding: 16px; min-height: 60px; margin: 10px 0; font-size: 16px; }
#log { margin-top: 10px; padding: 10px; border: 1px solid #ccc; min-height: 200px; font-family: monospace; font-size: 11px; white-space: pre-wrap; overflow-y: auto; }
</style>
</head>
<body>
<h3>ContentEditable Feature Test</h3>
<div id="editor" contenteditable="true">Hello World Test</div>
<div id="log"></div>
<script>
var log = document.getElementById('log');
var editor = document.getElementById('editor');
function addLog(msg) { log.textContent += msg + '\n'; console.log('[CE] ' + msg); }

editor.focus();

// Test 1: Bold only
addLog('=== Test 1: Bold only ===');
document.execCommand('selectAll');
var r1 = document.execCommand('bold');
addLog('bold result: ' + r1 + ' => ' + editor.innerHTML);

// Reset
editor.innerHTML = 'Hello World Test';

// Test 2: Italic only
addLog('=== Test 2: Italic only ===');
document.execCommand('selectAll');
var r2 = document.execCommand('italic');
addLog('italic result: ' + r2 + ' => ' + editor.innerHTML);

// Reset
editor.innerHTML = 'Hello World Test';

// Test 3: Underline only
addLog('=== Test 3: Underline only ===');
document.execCommand('selectAll');
var r3 = document.execCommand('underline');
addLog('underline result: ' + r3 + ' => ' + editor.innerHTML);

// Reset
editor.innerHTML = 'Hello World Test';

// Test 4: insertText
addLog('=== Test 4: insertText ===');
document.execCommand('selectAll');
var r4 = document.execCommand('insertText', false, 'Replaced');
addLog('insertText result: ' + r4 + ' => ' + editor.innerHTML);

// Reset
editor.innerHTML = 'Hello World Test';

// Test 5: Bold then Italic (same selection)
addLog('=== Test 5: Bold then Italic on fresh text ===');
document.execCommand('selectAll');
var r5a = document.execCommand('bold');
addLog('bold result: ' + r5a + ' => ' + editor.innerHTML);
// Re-select for italic
document.execCommand('selectAll');
var r5b = document.execCommand('italic');
addLog('italic result: ' + r5b + ' => ' + editor.innerHTML);

// Test 6: Delete
editor.innerHTML = 'Hello World Test';
addLog('=== Test 6: Delete ===');
document.execCommand('selectAll');
var r6 = document.execCommand('delete');
addLog('delete result: ' + r6 + ' => "' + editor.innerHTML + '"');

addLog('=== All tests complete ===');
</script>
</body>
</html>
