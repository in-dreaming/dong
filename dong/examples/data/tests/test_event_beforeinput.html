<!DOCTYPE html>
<html>
<head>
<style>
  body { font-size: 16px; padding: 20px; }
  #target { padding: 20px; background: lightyellow; border: 2px solid orange; min-height: 60px; }
  #result { margin-top: 20px; padding: 10px; background: #eee; white-space: pre; font-family: monospace; }
</style>
</head>
<body>
  <div id="target" tabindex="0">Click and type here</div>
  <div id="result"></div>
  <script>
    var r = '';
    var target = document.getElementById('target');
    var preventNextInput = false;

    // beforeinput event fires BEFORE input, can be canceled
    target.addEventListener('beforeinput', function(e) {
      r += 'beforeinput:\n';
      r += '  type=' + e.type + '\n';
      r += '  inputType=' + e.inputType + '\n';
      r += '  data=' + (e.data !== null ? '"' + e.data + '"' : 'null') + '\n';
      r += '  bubbles=' + e.bubbles + '\n';
      r += '  cancelable=' + e.cancelable + '\n';
      r += '  isTrusted=' + e.isTrusted + '\n';

      // Example: prevent 'a' character from being inserted
      if (e.data === 'a' && preventNextInput) {
        e.preventDefault();
        r += '  PREVENTED (default action canceled)\n';
      }
      document.getElementById('result').textContent = r;
    });

    // input event fires after beforeinput (unless prevented)
    target.addEventListener('input', function(e) {
      r += 'input:\n';
      r += '  type=' + e.type + '\n';
      r += '  inputType=' + e.inputType + '\n';
      r += '  data=' + (e.data !== null ? '"' + e.data + '"' : 'null') + '\n';
      r += '  isTrusted=' + e.isTrusted + '\n';
      document.getElementById('result').textContent = r;
    });

    // Toggle button to test preventDefault
    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'p') {
        preventNextInput = !preventNextInput;
        r += '\n=== Prevent mode: ' + (preventNextInput ? 'ON (press Ctrl+P to toggle)' : 'OFF (press Ctrl+P to toggle)') + ' ===\n';
        r += 'Type "a" to test preventDefault\n\n';
        document.getElementById('result').textContent = r;
      }
    });

    r += 'Beforeinput event test loaded\n';
    r += 'Type characters to see beforeinput and input events\n';
    r += 'Beforeinput fires BEFORE input and can be canceled\n';
    r += 'Press Ctrl+P to toggle "prevent next input" mode\n';
    r += 'When enabled, typing "a" will be prevented\n\n';
    document.getElementById('result').textContent = r;
    console.log('Beforeinput event test loaded');
  </script>
</body>
</html>
