<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
<style>
body { font-family: sans-serif; padding: 10px; }
#editor {
    border: 2px solid #333;
    padding: 16px;
    min-height: 60px;
    margin: 10px 0;
    font-size: 16px;
}
#log { margin-top: 10px; padding: 10px; border: 1px solid #ccc; min-height: 100px; font-family: monospace; font-size: 11px; white-space: pre-wrap; overflow-y: auto; }
button { margin: 4px; padding: 6px 12px; }
</style>
</head>
<body>
<h3>CE Debug Test</h3>

<div>
    <button id="btnBold">Bold</button>
    <button id="btnItalic">Italic</button>
    <button id="btnUnderline">Underline</button>
    <button id="btnSelectAll">SelectAll</button>
</div>

<div id="editor" contenteditable="true">Hello World Test</div>

<div id="log"></div>

<script>
var log = document.getElementById('log');
var editor = document.getElementById('editor');

function addLog(msg) {
    log.textContent += msg + '\n';
    console.log('[CE-DBG] ' + msg);
}

// Use onclick handlers with logging
document.getElementById('btnBold').onclick = function() {
    addLog('--- Bold clicked ---');
    addLog('sel exists: true');
    var result = document.execCommand('bold');
    addLog('bold result: ' + result);
    addLog('innerHTML: ' + editor.innerHTML);
};

document.getElementById('btnItalic').onclick = function() {
    addLog('--- Italic clicked ---');
    addLog('sel exists: true');
    var result = document.execCommand('italic');
    addLog('italic result: ' + result);
    addLog('innerHTML: ' + editor.innerHTML);
};

document.getElementById('btnUnderline').onclick = function() {
    addLog('--- Underline clicked ---');
    addLog('sel exists: true');
    var result = document.execCommand('underline');
    addLog('underline result: ' + result);
    addLog('innerHTML: ' + editor.innerHTML);
};

document.getElementById('btnSelectAll').onclick = function() {
    addLog('--- SelectAll clicked ---');
    var result = document.execCommand('selectAll');
    addLog('selectAll result: ' + result);
};

addLog('Ready. Click editor, select text, then click a button.');
</script>
</body>
</html>
