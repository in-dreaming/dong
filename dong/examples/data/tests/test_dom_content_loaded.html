<!DOCTYPE html>
<html>
<head>
<style>
  body { font-size: 16px; padding: 20px; }
  #result { margin-top: 20px; padding: 10px; background: #eee; white-space: pre; font-family: monospace; }
</style>
</head>
<body>
  <div id="result">Waiting for DOMContentLoaded...</div>
  <script>
    var r = '';
    // This script runs during DOM parsing, DOMContentLoaded should fire after all scripts
    r += 'Script executed\n';

    document.addEventListener('DOMContentLoaded', function() {
      r += 'DOMContentLoaded fired: PASS\n';
      document.getElementById('result').textContent = r;
    });

    r += 'DOMContentLoaded listener registered\n';
    document.getElementById('result').textContent = r;
    console.log('DOMContentLoaded test loaded');
  </script>
</body>
</html>
