<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: sans-serif; padding: 20px; }
</style>
</head>
<body>
<h3>Style Render Test</h3>
<p>Normal text</p>
<p><span style="font-weight:bold;">Bold text</span></p>
<p><span style="font-style:italic;">Italic text</span></p>
<p><span style="text-decoration:underline;">Underline text</span></p>
<p><span style="font-weight:bold; font-style:italic;">Bold+Italic text</span></p>
<p><span style="font-weight:bold; font-style:italic; text-decoration:underline;">All styles</span></p>
<p><span style="font-weight:bold; font-style:italic; text-decoration:underline; display:inline;">All styles + display:inline</span></p>
</body>
</html>
