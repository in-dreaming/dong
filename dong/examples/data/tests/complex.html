<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>ux_gen_pipe UI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
    }

    /* =========================
       Layout: Grid → Flex
       ========================= */
    .layout {
      display: flex;
      height: 100vh;
    }

    .layout > .panel:nth-child(1) {
      flex: 0 0 280px;
    }

    .layout > .panel:nth-child(2) {
      flex: 1 1 auto;
      min-width: 0;
    }

    .layout > .panel:nth-child(3) {
      flex: 0 0 420px;
    }

    /* ========================= */

    .panel {
      border-right: 1px solid #ddd;
      overflow: auto;
      box-sizing: border-box;
    }

    .panel:last-child {
      border-right: none;
      border-left: 1px solid #ddd;
    }

    .toolbar {
      padding: 10px;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
    }

    .list {
      padding: 10px;
    }

    .item {
      padding: 6px 8px;
      cursor: pointer;
      border-radius: 6px;
    }

    .item:hover {
      background: #f6f6f6;
    }

    .item.active {
      background: #e9f2ff;
    }

    .canvasWrap {
      position: relative;
      padding: 10px;
    }

    #img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    #canvas {
      position: absolute;
      left: 10px;
      top: 10px;
      pointer-events: none;
    }

    /* =========================
       Right panel layout
       ========================= */
    .right {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: calc(100vh - 72px);
      box-sizing: border-box;
    }

    /* rightSplit: Grid → Flex */
    .rightSplit {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .rightSplit > div:first-child {
      flex: 0 0 190px;
    }

    .rightSplit > div:last-child {
      flex: 1 1 auto;
      min-width: 0;
    }

    /* ========================= */

    .elList {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 6px;
      height: 360px;
      overflow: auto;
    }

    .elListItem {
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .elListItem:hover {
      background: #f6f6f6;
    }

    .elListItem.active {
      background: #e9f2ff;
      border-color: #cfe2ff;
    }

    .elListItem.deleted {
      opacity: 0.55;
      text-decoration: line-through;
    }

    .elDetail {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 8px;
    }

    .dslTree {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 8px;
      max-height: 360px;
      overflow: auto;
    }

    .dslNodeItem {
      cursor: pointer;
      border-radius: 4px;
      padding: 2px 4px;
      display: inline-block;
    }

    .dslNodeItem:hover {
      background: #f6f6f6;
    }

    .dslNodeItem.active {
      background: #fff2cc;
      box-shadow: 0 0 0 2px rgba(255, 226, 128, 0.6);
    }

    .dslChildren {
      margin-left: 14px;
      padding-left: 10px;
      border-left: 1px dashed #ddd;
    }

    .elRow {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 8px;
    }

    .elRow.active {
      border-color: #4c8bf5;
      box-shadow: 0 0 0 2px rgba(76,139,245,0.15);
    }

    .muted {
      color: #666;
      font-size: 12px;
    }

    input,
    select,
    textarea {
      width: 100%;
      box-sizing: border-box;
      margin: 4px 0;
    }

    button {
      margin-right: 6px;
    }

    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>

<body>
<div class="layout">

  <!-- Left panel -->
  <div class="panel">
    <div class="toolbar">
      <button id="refresh">刷新列表</button>

      <div style="margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
        <div><b>全局评测</b></div>
        <div class="muted" style="margin-top:4px;">
          执行 query + 评分统计，并 dump 到 log/
        </div>

        <input id="evalKs" value="1,3,5,10" placeholder="TopK，例如 1,3,5,10" />

        <label class="muted" style="display:block; margin-top:4px;">
          <input id="evalAutoDetect" type="checkbox" checked />
          缓存缺 detect 时自动跑 detect
        </label>

        <div style="margin-top:6px;">
          <button id="btnEvalAll">评测全部条目</button>
          <button id="btnEvalCur">评测当前条目</button>
        </div>

        <div id="evalStatus" class="muted" style="margin-top:8px;">
          未运行
        </div>
      </div>
    </div>

    <div id="entryList" class="list"></div>
  </div>

  <!-- Middle panel -->
  <div class="panel">
    <div class="toolbar">
      <span id="curUi" class="muted">未选择条目</span>

      <div style="margin-top:8px;">
        <button id="btnDetect">对当前条目运行 detect</button>
      </div>

      <label class="muted" style="display:block; margin-top:8px;">
        <input id="showAllBounds" type="checkbox" />
        显示全部 bounds（关闭则仅渲染选中 element）
      </label>
    </div>

    <div class="canvasWrap">
      <img id="img" />
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <!-- Right panel -->
  <div class="panel">
    <div class="toolbar">
      <div><b>Elements</b></div>
      <div class="muted">
        点击 element 高亮；可编辑/删除；可绑定到 test_cases.node_id
      </div>
    </div>

    <div class="right">
      <div class="rightSplit">
        <div>
          <div class="muted" style="margin-bottom:6px;">
            <b>Elements 列表</b>（显示 eid + node_id）
          </div>
          <div id="elementList" class="elList"></div>
        </div>

        <div>
          <div class="muted" style="margin-bottom:6px;">
            <b>选中 Element</b>（仅显示一个）
          </div>
          <div id="elementDetail" class="elDetail muted">
            未选择 element
          </div>
        </div>
      </div>

      <div>
        <div class="muted" style="margin-bottom:6px;">
          <b>DSL 树</b>（选中 element 会高亮对应节点）
        </div>
        <div id="dslTree" class="dslTree muted">未选择条目</div>
        <div id="dslNode" class="muted" style="margin-top:8px;">
          未选择 element
        </div>
      </div>

      <div>
        <div class="muted" style="margin-bottom:6px;">
          <b>Ground Truth</b>
        </div>
        <div id="gt" class="muted">未选择条目</div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
