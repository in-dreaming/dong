<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0f17;
    }
    #box {
      width: 240px;
      height: 150px;
      background: rgb(255, 90, 90);
      border-radius: 18px;
      border: 4px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 12px 34px rgba(0,0,0,0.55);
    }
    body.ok #box {
      background: rgb(80, 220, 140);
    }
  </style>
</head>
<body>
  <div id="box"></div>
  <script>
    var box = document.getElementById('box');
    var ok = false;
    if (typeof getComputedStyle === 'function') {
      var cs = getComputedStyle(box);
      if (cs && typeof cs.getPropertyValue === 'function') {
        var v = cs.getPropertyValue('display');
        if (typeof v === 'string') {
          ok = true;
        }
      }
    }
    if (ok) {
      // Drive a visible change for pixel-baseline regression.
      box.setAttribute('class', 'ok');
      document.body.setAttribute('class', 'ok');
    }
  </script>
</body>
</html>
