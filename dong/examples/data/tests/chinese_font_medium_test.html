<!DOCTYPE html>
<!-- porffor: ready -->
<html>
<head>
    <meta charset="utf-8">
    <title>Chinese Medium Fonts - 中号字体测试</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: #f59e0b;
            color: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .header h1 { margin: 0; font-size: 20px; }
        .header p { margin: 4px 0 0 0; font-size: 12px; opacity: 0.9; }
        
        .row {
            display: flex;
            align-items: center;
            background: white;
            margin-bottom: 12px;
            padding: 16px;
            border-radius: 6px;
            border-left: 3px solid #f59e0b;
        }
        .label {
            width: 70px;
            font-size: 13px;
            color: #666;
        }
        .text { flex: 1; }
        
        .size-18px { font-size: 18px; }
        .size-20px { font-size: 20px; }
        .size-22px { font-size: 22px; }
        .size-24px { font-size: 24px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>中号字体测试 Medium Fonts (18px-24px)</h1>
        <p>标题和重点文字尺寸</p>
    </div>
    
    <div class="row">
        <div class="label">18px</div>
        <div class="text size-18px">中文测试 Chinese 18px副标题</div>
    </div>
    <div class="row">
        <div class="label">20px</div>
        <div class="text size-20px">中文测试 Chinese 20px小标题</div>
    </div>
    <div class="row">
        <div class="label">22px</div>
        <div class="text size-22px">中文测试 Chinese 22px标题</div>
    </div>
    <div class="row">
        <div class="label">24px</div>
        <div class="text size-24px">中文测试 Chinese 24px大标题</div>
    </div>
</body>
</html>
