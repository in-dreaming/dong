<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="dong-render-mode" content="scene">
  <title>Game UI - 新手引导活动中心 (Scene Compiled)</title>
</head>
<body style="margin: 0; padding: 0; background-color: #1a1a1a; font-family: sans-serif; color: #eee; overflow: hidden; width: 1920px; height: 1080px;">

<div id="root_canvas" style="position: absolute; left: 0px; top: 0px; width: 1920px; height: 1080px; background: #121417;">

  <!-- 背景装饰层 -->
  <div id="bg_decoration" style="position: absolute; left: 0px; top: 0px; width: 1920px; height: 1080px; background: rgba(255,255,255,0.02);"></div>

  <!-- 返回按钮 -->
  <div id="back_btn" style="position: absolute; left: 40px; top: 40px; width: 80px; height: 80px; border: 2px solid #555; border-radius: 40px; text-align: center; line-height: 80px; font-size: 40px; background: rgba(0,0,0,0.3);">←</div>

  <!-- 活动倒计时 -->
  <div id="countdown_bg" style="position: absolute; left: 1600px; top: 50px; width: 280px; height: 40px; border: 1px solid #444; background: rgba(0,0,0,0.5); border-radius: 20px;"></div>
  <div id="countdown_text" style="position: absolute; left: 1620px; top: 50px; width: 250px; height: 40px; font-size: 18px; color: #ffcc00; line-height: 40px;">剩余 06天 23时</div>

  <!-- 左侧：活动导航区 -->
  <div id="nav_sidebar_bg" style="position: absolute; left: 60px; top: 180px; width: 300px; height: 800px;"></div>
  <div id="timeline_line" style="position: absolute; left: 100px; top: 180px; width: 2px; height: 700px; background: #444;"></div>

  <!-- 导航项 1 (选中) -->
  <div id="nav_item_1_bg" style="position: absolute; left: 60px; top: 200px; width: 280px; height: 100px; background: rgba(255,204,0,0.1); border-left: 4px solid #ffcc00;"></div>
  <div id="nav_item_1_dot" style="position: absolute; left: 92px; top: 242px; width: 16px; height: 16px; background: #ffcc00; border-radius: 8px;"></div>
  <div id="nav_item_1_text" style="position: absolute; left: 120px; top: 200px; width: 200px; height: 100px; font-size: 24px; font-weight: bold; color: #ffcc00; line-height: 100px;">稷下严选</div>

  <!-- 导航项 2 -->
  <div id="nav_item_2_dot" style="position: absolute; left: 94px; top: 364px; width: 12px; height: 12px; background: #444; border-radius: 6px;"></div>
  <div id="nav_item_2_text" style="position: absolute; left: 120px; top: 320px; width: 220px; height: 100px; font-size: 22px; color: #888; line-height: 100px;">藏狐风物图鉴</div>

  <!-- 导航项 3 -->
  <div id="nav_item_3_dot" style="position: absolute; left: 94px; top: 484px; width: 12px; height: 12px; background: #444; border-radius: 6px;"></div>
  <div id="nav_item_3_text" style="position: absolute; left: 120px; top: 440px; width: 220px; height: 100px; font-size: 22px; color: #888; line-height: 100px;">未来扩展活动...</div>

  <!-- 中部：阶段页签 -->
  <div id="tab_day_1" style="position: absolute; left: 400px; top: 120px; width: 180px; height: 60px; background: #333; border-bottom: 4px solid #ffcc00; text-align: center; line-height: 60px; font-weight: bold; color: #eee;">DAY 1 (2/4)</div>
  <div id="tab_day_2" style="position: absolute; left: 590px; top: 120px; width: 180px; height: 60px; background: #222; text-align: center; line-height: 60px; color: #888;">DAY 2 (0/4)</div>
  <div id="tab_day_3" style="position: absolute; left: 780px; top: 120px; width: 180px; height: 60px; background: #222; text-align: center; line-height: 60px; color: #888;">DAY 3</div>
  <div id="tab_day_7" style="position: absolute; left: 970px; top: 120px; width: 180px; height: 60px; background: #222; text-align: center; line-height: 60px; color: #888;">DAY 7</div>

  <!-- 奖励卡片 1: 已领取 -->
  <div id="card1_bg" style="position: absolute; left: 400px; top: 220px; width: 200px; height: 280px; border: 1px solid #444; background: rgba(0,0,0,0.2);"></div>
  <div id="card1_img" style="position: absolute; left: 400px; top: 220px; width: 200px; height: 180px; background: rgba(255,255,255,0.05); text-align: center; line-height: 180px; color: #aaa;">铭文碎片×500</div>
  <div id="card1_desc" style="position: absolute; left: 400px; top: 400px; width: 200px; height: 40px; text-align: center; font-size: 14px; color: #666;">完成对局1场</div>
  <div id="card1_check_overlay" style="position: absolute; left: 400px; top: 220px; width: 200px; height: 280px; background: rgba(0,255,0,0.1); text-align: center; line-height: 280px; font-size: 60px; color: #00ff00;">✓</div>

  <!-- 奖励卡片 2: 可领取 -->
  <div id="card2_bg" style="position: absolute; left: 630px; top: 220px; width: 200px; height: 280px; border: 2px solid #ffcc00; background: rgba(255,204,0,0.05);"></div>
  <div id="card2_img" style="position: absolute; left: 630px; top: 220px; width: 200px; height: 180px; background: rgba(255,255,255,0.1); text-align: center; line-height: 180px; color: #eee;">英雄碎片×5</div>
  <div id="card2_desc" style="position: absolute; left: 630px; top: 400px; width: 200px; height: 40px; text-align: center; font-size: 14px; color: #ffcc00;">击败小兵20个</div>
  <div id="card2_btn" style="position: absolute; left: 655px; top: 450px; width: 150px; height: 36px; background: #ffcc00; color: #000; text-align: center; line-height: 36px; border-radius: 4px; font-weight: bold; font-size: 14px;">点击领取</div>

  <!-- 奖励卡片 3: 未解锁 -->
  <div id="card3_bg" style="position: absolute; left: 860px; top: 220px; width: 200px; height: 280px; border: 1px solid #444; background: rgba(0,0,0,0.4);"></div>
  <div id="card3_lock" style="position: absolute; left: 860px; top: 220px; width: 200px; height: 180px; text-align: center; line-height: 180px; font-size: 40px; color: #666;">locked</div>
  <div id="card3_desc" style="position: absolute; left: 860px; top: 400px; width: 200px; height: 40px; text-align: center; font-size: 14px; color: #444;">待解锁</div>

  <!-- 奖励卡片 4: 任务关联 -->
  <div id="card4_bg" style="position: absolute; left: 1090px; top: 220px; width: 200px; height: 280px; border: 1px solid #444; background: rgba(0,0,0,0.2);"></div>
  <div id="card4_img" style="position: absolute; left: 1090px; top: 220px; width: 200px; height: 180px; background: rgba(255,255,255,0.05); text-align: center; line-height: 180px; color: #aaa;">金币×888</div>
  <div id="card4_desc" style="position: absolute; left: 1090px; top: 400px; width: 200px; height: 40px; text-align: center; font-size: 14px; color: #3498db;">前往：参与排位赛</div>

  <!-- 右侧：主奖励区 -->
  <div id="panel_bg" style="position: absolute; left: 1350px; top: 120px; width: 530px; height: 880px; background: rgba(255,255,255,0.03); border-left: 1px solid #333;"></div>

  <!-- 标题 -->
  <div id="main_title" style="position: absolute; left: 1380px; top: 150px; width: 440px; height: 40px; font-size: 36px; font-weight: bold; color: #fff;">稷下精选，必做指南</div>
  <div id="sub_title" style="position: absolute; left: 1380px; top: 200px; width: 440px; height: 24px; font-size: 18px; color: #888;">完成新手任务，领取强力召唤兽</div>
  <div id="rule_icon" style="position: absolute; left: 1830px; top: 155px; width: 30px; height: 30px; border: 1px solid #888; border-radius: 15px; text-align: center; line-height: 30px; font-size: 16px; color: #888;">i</div>

  <!-- 英雄立绘区 -->
  <div id="hero_preview" style="position: absolute; left: 1380px; top: 260px; width: 440px; height: 500px; background: rgba(0,0,0,0.2); border: 1px solid #444;"></div>
  <div id="hero_placeholder" style="position: absolute; left: 1380px; top: 260px; width: 440px; height: 500px; text-align: center; line-height: 500px; font-size: 24px; color: #444;">[ 鲁班6号 立绘 ]</div>

  <!-- 奖励标签 -->
  <div id="reward_type_tag" style="position: absolute; left: 1400px; top: 660px; width: 60px; height: 24px; background: #e74c3c; border-radius: 4px; text-align: center; line-height: 24px; font-size: 14px; color: #fff;">召唤兽</div>
  <div id="reward_name" style="position: absolute; left: 1400px; top: 690px; width: 300px; height: 50px; font-size: 48px; font-weight: bold; color: #fff;">鲁班6号</div>

  <!-- 进度信息 -->
  <div id="progress_label" style="position: absolute; left: 1380px; top: 790px; width: 440px; height: 24px; text-align: center; font-size: 18px; color: #ccc;">完成任意2个任务可领取</div>
  <div id="progress_value" style="position: absolute; left: 1380px; top: 820px; width: 440px; height: 28px; text-align: center; font-size: 20px; color: #ffcc00; font-weight: bold;">进度: 1 / 2</div>
  <div id="progress_bar_bg" style="position: absolute; left: 1380px; top: 858px; width: 440px; height: 8px; background: #222; border-radius: 4px;"></div>
  <div id="progress_bar_fill" style="position: absolute; left: 1380px; top: 858px; width: 220px; height: 8px; background: #ffcc00; border-radius: 4px;"></div>

  <!-- 核心操作按钮 (disabled 状态) -->
  <div id="main_action_btn" style="position: absolute; left: 1380px; top: 910px; width: 440px; height: 80px; background: #555; color: #888; text-align: center; line-height: 80px; font-size: 28px; font-weight: bold; border-radius: 10px;">激活召唤兽</div>

</div>

<script>
(function() {
    if (typeof dong === 'undefined' || !dong.scene) return;
    var S = dong.scene;

    // 导航点击
    var navItems = [
        { text: 'nav_item_1_text', bg: 'nav_item_1_bg' },
        { text: 'nav_item_2_text' },
        { text: 'nav_item_3_text' }
    ];

    for (var i = 0; i < navItems.length; i++) {
        (function(idx) {
            var tid = S.find(navItems[idx].text);
            if (tid > 0) {
                S.on(tid, 'click', function() {
                    // Update highlight
                    for (var j = 0; j < navItems.length; j++) {
                        var jtid = S.find(navItems[j].text);
                        if (jtid > 0) {
                            S.set(jtid, 'color', j === idx ? '#ffcc00' : '#888');
                        }
                    }
                });
            }
        })(i);
    }

    // 领取按钮点击
    var btnId = S.find('card2_btn');
    if (btnId > 0) {
        S.on(btnId, 'click', function() {
            S.set(btnId, 'text', '已领取');
            S.set(btnId, 'background', '#555');
            S.set(btnId, 'color', '#888');
            // Update progress
            var pv = S.find('progress_value');
            if (pv > 0) S.set(pv, 'text', '进度: 2 / 2');
            var pf = S.find('progress_bar_fill');
            if (pf > 0) S.set(pf, 'w', 440);
            // Enable main button
            var ab = S.find('main_action_btn');
            if (ab > 0) {
                S.set(ab, 'background', '#ffcc00');
                S.set(ab, 'color', '#000');
            }
        });
    }

    // 返回按钮
    var backId = S.find('back_btn');
    if (backId > 0) {
        S.on(backId, 'click', function() {
            var mt = S.find('main_title');
            if (mt > 0) S.set(mt, 'text', '此功能正在开发中');
        });
    }

    // 规则按钮
    var ruleId = S.find('rule_icon');
    if (ruleId > 0) {
        S.on(ruleId, 'click', function() {
            var st = S.find('sub_title');
            if (st > 0) S.set(st, 'text', '活动规则: 每日完成指定任务领取奖励');
        });
    }
})();
</script>

</body>
</html>
