<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dual-Mode Rendering</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0e17;
    font-family: sans-serif;
    overflow: hidden;
    width: 960px;
    height: 600px;
    color: #c9d1d9;
}

/* === RETAINED MODE: Static DOM UI === */
.topbar {
    position: absolute;
    left: 0; top: 0; right: 0; height: 36px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 13px;
    color: #8b949e;
}
.topbar-title {
    color: #f0f6fc;
    font-weight: bold;
    margin-right: 24px;
}
.topbar-item { margin-right: 16px; }

.sidebar {
    position: absolute;
    left: 0; top: 36px; bottom: 0; width: 180px;
    background: #0d1117;
    border-right: 1px solid #21262d;
    padding: 12px 0;
}
.sidebar-item {
    padding: 6px 16px;
    font-size: 13px;
    color: #8b949e;
    cursor: pointer;
}
.sidebar-item.active {
    color: #f0f6fc;
    background: #1f2937;
    border-left: 2px solid #58a6ff;
}

.panel {
    position: absolute;
    left: 180px; top: 36px; right: 240px; bottom: 0;
    background: #0d1117;
}
.panel-header {
    padding: 16px 20px 8px;
    font-size: 18px;
    font-weight: bold;
    color: #f0f6fc;
    white-space: nowrap;
    width: 400px;
}
.panel-desc {
    padding: 0 20px 12px;
    font-size: 12px;
    color: #8b949e;
    white-space: nowrap;
    width: 500px;
}

.status-bar {
    position: absolute;
    right: 0; top: 36px; bottom: 0; width: 240px;
    background: #161b22;
    border-left: 1px solid #21262d;
    padding: 16px;
}
.status-title {
    font-size: 11px;
    text-transform: uppercase;
    color: #8b949e;
    letter-spacing: 1px;
    margin-bottom: 12px;
    white-space: nowrap;
    width: 200px;
}
.stat-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
    white-space: nowrap;
    width: 200px;
}
.stat-label { color: #8b949e; }
.stat-value { color: #58a6ff; }

#hud {
    position: absolute;
    left: 196px; bottom: 8px;
    font-size: 11px;
    color: #484f58;
    white-space: nowrap;
}
</style>
</head>
<body data-porffor-module="pretext_dual_mode">

<!-- ====== RETAINED MODE: Static DOM structure ====== -->
<div class="topbar">
    <span class="topbar-title">Dong Engine</span>
    <span class="topbar-item">Dual-Mode Demo</span>
    <span class="topbar-item">Retained + Immediate</span>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-item active" data-mode="dashboard">Dashboard</div>
    <div class="sidebar-item" data-mode="textflow">Text Flow</div>
    <div class="sidebar-item" data-mode="particles">Particles</div>
    <div class="sidebar-item" data-mode="charts">Charts</div>
    <div class="sidebar-item" data-mode="settings">Settings</div>
</div>

<div class="panel">
    <div class="panel-header">Dual-Mode Rendering Engine</div>
    <div class="panel-desc">Static DOM (retained) + Dynamic overlay (immediate) — zero DOM tax on animation frames</div>
</div>

<div class="status-bar">
    <div class="status-title">Performance</div>
    <div class="stat-row"><span class="stat-label">Mode</span><span class="stat-value">Dual</span></div>
    <div class="stat-row"><span class="stat-label">DOM items</span><span class="stat-value">~20</span></div>
    <div class="stat-row"><span class="stat-label">Overlay items</span><span class="stat-value" id="ov-count">0</span></div>
    <div class="stat-row"><span class="stat-label">Particles</span><span class="stat-value" id="p-count">0</span></div>
</div>

<div id="hud" style="display:none"></div>

<!-- ====== IMMEDIATE MODE: All dynamic content via dong.* overlay API ====== -->
<script>
(function() {
    if (typeof dong === 'undefined' || typeof dong.drawRect !== 'function') {
        document.getElementById('hud').textContent = 'Immediate mode API unavailable';
        return;
    }

    var W = 960, H = 600;
    var PANEL_LEFT = 180, PANEL_TOP = 36, PANEL_RIGHT = 720, PANEL_BOTTOM = 600;
    var PW = PANEL_RIGHT - PANEL_LEFT, PH = PANEL_BOTTOM - PANEL_TOP;

    // ---- Current mode ----
    var currentMode = 'dashboard';

    // ---- Sidebar click handler (Retained Mode interaction) ----
    var sidebarItems = document.getElementById('sidebar').children;
    for (var si = 0; si < sidebarItems.length; si++) {
        (function(el) {
            el.addEventListener('click', function() {
                for (var j = 0; j < sidebarItems.length; j++) {
                    sidebarItems[j].setAttribute('class', 'sidebar-item');
                }
                el.setAttribute('class', 'sidebar-item active');
                currentMode = el.getAttribute('data-mode');

                var titles = {
                    dashboard: 'Dual-Mode Rendering Engine',
                    textflow: 'Text Flow with Obstacles',
                    particles: 'Particle System',
                    charts: 'Real-Time Charts',
                    settings: 'Architecture Info'
                };
                var descs = {
                    dashboard: 'Static DOM (retained) + Dynamic overlay (immediate) — zero DOM tax',
                    textflow: 'Text wraps around moving circular obstacles — all via overlay API',
                    particles: '120 particles rendered via dong.drawCircle() — zero DOM elements',
                    charts: 'Animated bar chart rendered via dong.drawRect() — pure immediate mode',
                    settings: 'Retained DOM: menus, panels | Immediate: particles, text, charts'
                };
                document.querySelector('.panel-header').textContent = titles[currentMode] || '';
                document.querySelector('.panel-desc').textContent = descs[currentMode] || '';
            });
        })(sidebarItems[si]);
    }

    // ---- Particle system ----
    var particles = [];
    var MAX_PARTICLES = 120;

    function spawnParticle() {
        return {
            x: PANEL_LEFT + 40 + Math.random() * (PW - 80),
            y: PANEL_BOTTOM - 20,
            vx: (Math.random() - 0.5) * 2,
            vy: -1.5 - Math.random() * 2.5,
            r: 3 + Math.random() * 5,
            life: 1.0,
            decay: 0.005 + Math.random() * 0.01,
            hue: Math.floor(Math.random() * 360)
        };
    }

    for (var i = 0; i < MAX_PARTICLES; i++) {
        var p = spawnParticle();
        p.life = Math.random();
        p.y = PANEL_TOP + 60 + Math.random() * (PH - 120);
        particles.push(p);
    }

    function hslToHex(h, s, l) {
        s /= 100; l /= 100;
        var a = s * Math.min(l, 1 - l);
        var f = function(n) {
            var k = (n + h / 30) % 12;
            var c = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
            return Math.round(255 * c).toString(16).padStart(2, '0');
        };
        return '#' + f(0) + f(8) + f(4);
    }

    // ---- Obstacles ----
    var obs = [
        { cx: 350, cy: 200, r: 40, speed: 0.8, phase: 0 },
        { cx: 500, cy: 350, r: 30, speed: 1.2, phase: 2.1 },
        { cx: 600, cy: 250, r: 25, speed: 0.6, phase: 4.0 }
    ];

    var text =
        "In a dual-mode rendering engine, static UI structure lives in the DOM — " +
        "menus, panels, labels, and interactive elements are described in HTML/CSS " +
        "and rendered through the retained pipeline. But dynamic content — particles, " +
        "animated text, real-time visualizations — bypasses the DOM entirely. " +
        "The immediate-mode overlay API (dong.drawRect, dong.drawCircle, dong.renderText) " +
        "injects GPU commands directly into the display list, achieving zero DOM tax " +
        "on animation frames. This is the architecture pretext envisions: free from " +
        "DOM-based layout constraints, while keeping DOM for what it does best.";

    // ---- Chart data ----
    var chartBars = [];
    var NUM_BARS = 12;
    for (var bi = 0; bi < NUM_BARS; bi++) {
        chartBars.push({ value: 0.3 + Math.random() * 0.7, target: 0.3 + Math.random() * 0.7 });
    }

    var frameCount = 0, fps = 0, lastFpsTime = 0;
    var t = 0;

    function updateParticles() {
        for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.02;
            p.life -= p.decay;
            if (p.life <= 0) {
                particles[i] = spawnParticle();
            }
        }
    }

    function updateObstacles() {
        var centerX = (PANEL_LEFT + PANEL_RIGHT) / 2;
        var centerY = (PANEL_TOP + 80 + PANEL_BOTTOM) / 2;
        for (var oi = 0; oi < obs.length; oi++) {
            var o = obs[oi];
            o.cx = centerX + Math.sin(t * 0.02 * o.speed + o.phase) * 160;
            o.cy = centerY + Math.cos(t * 0.015 * o.speed + o.phase) * 120;
        }
    }

    function drawParticles(count) {
        var n = 0;
        var limit = count || particles.length;
        for (var i = 0; i < limit && i < particles.length; i++) {
            var p = particles[i];
            var alpha = Math.floor(Math.max(0, p.life) * 200).toString(16).padStart(2, '0');
            dong.drawCircle({ cx: p.x, cy: p.y, r: p.r * Math.max(0, p.life), color: hslToHex(p.hue, 70, 55) + alpha });
            n++;
        }
        return n;
    }

    function drawObstacles() {
        var n = 0;
        for (var oi = 0; oi < obs.length; oi++) {
            var o = obs[oi];
            dong.drawCircle({ cx: o.cx, cy: o.cy, r: o.r, color: '#58a6ff20', strokeWidth: 1.5 });
            dong.drawCircle({ cx: o.cx, cy: o.cy, r: o.r * 0.6, color: '#58a6ff10' });
            n += 2;
        }
        return n;
    }

    function drawTextFlow() {
        var col = {
            x: PANEL_LEFT + 20, y: PANEL_TOP + 80,
            width: PW - 40, height: PH - 100
        };
        var result = dong.textLayout({
            text: text,
            font: { family: "sans-serif", size: 13 },
            lineHeight: 19,
            columns: [col],
            obstacles: {
                circles: obs.map(function(o) { return { cx: o.cx, cy: o.cy, r: o.r, hPad: 10, vPad: 3 }; })
            }
        });
        var allLines = [];
        for (var ci = 0; ci < result.columns.length; ci++) {
            var lines = result.columns[ci].lines;
            for (var li = 0; li < lines.length; li++) allLines.push(lines[li]);
        }
        dong.renderText({ font: { family: "sans-serif", size: 13 }, color: "#b1bac4", lines: allLines });
        return allLines.length;
    }

    function drawGrid() {
        var n = 0;
        for (var gx = PANEL_LEFT + 60; gx < PANEL_RIGHT; gx += 80) {
            dong.drawRect({ x: gx, y: PANEL_TOP + 60, w: 1, h: PH - 80, color: '#21262d40' });
            n++;
        }
        for (var gy = PANEL_TOP + 80; gy < PANEL_BOTTOM - 20; gy += 60) {
            dong.drawRect({ x: PANEL_LEFT + 20, y: gy, w: PW - 40, h: 1, color: '#21262d40' });
            n++;
        }
        return n;
    }

    function drawCharts() {
        var n = 0;
        var barW = 30, gap = 10;
        var totalW = NUM_BARS * (barW + gap) - gap;
        var startX = PANEL_LEFT + (PW - totalW) / 2;
        var maxH = PH - 160;
        var baseY = PANEL_BOTTOM - 40;
        var colors = ['#58a6ff', '#3fb950', '#f97316', '#d2a8ff', '#f778ba', '#79c0ff',
                      '#56d364', '#ffa657', '#bc8cff', '#ff7eb6', '#a5d6ff', '#7ee787'];

        for (var bi = 0; bi < NUM_BARS; bi++) {
            var b = chartBars[bi];
            b.value += (b.target - b.value) * 0.05;
            if (Math.abs(b.value - b.target) < 0.01) b.target = 0.1 + Math.random() * 0.9;

            var barH = b.value * maxH;
            var x = startX + bi * (barW + gap);
            dong.drawRect({ x: x, y: baseY - barH, w: barW, h: barH, color: colors[bi % colors.length], radius: 3 });
            n++;

            var pct = Math.round(b.value * 100) + '%';
            dong.renderText({
                font: { family: "sans-serif", size: 10 },
                color: "#8b949e",
                lines: [{ x: x + 4, y: baseY + 6, text: pct }]
            });
            n++;
        }

        dong.renderText({
            font: { family: "sans-serif", size: 14 },
            color: "#f0f6fc",
            lines: [{ x: startX, y: PANEL_TOP + 60, text: "Real-Time Metrics (all via dong.drawRect)" }]
        });
        n++;
        return n;
    }

    function drawSettings() {
        var n = 0;
        var x0 = PANEL_LEFT + 30, y0 = PANEL_TOP + 80;
        var info = [
            "Architecture: Dual-Mode Rendering Engine",
            "",
            "Retained Mode (DOM):",
            "  - HTML/CSS parsed into DOM tree",
            "  - Yoga flexbox layout engine",
            "  - Display list cached when DOM unchanged",
            "  - Used for: menus, panels, status bars",
            "",
            "Immediate Mode (Overlay):",
            "  - dong.drawRect()   -> rounded rectangles",
            "  - dong.drawCircle() -> circles / arcs",
            "  - dong.renderText() -> batched glyph runs",
            "  - dong.clearOverlay() -> frame reset",
            "  - Zero DOM tax on animation frames",
            "",
            "Skip-if-clean optimization:",
            "  When only overlay changes, DOM display list",
            "  is restored from cache — no DOM traversal."
        ];
        var lines = [];
        for (var i = 0; i < info.length; i++) {
            if (info[i] !== '') {
                lines.push({ x: x0, y: y0 + i * 22, text: info[i] });
            }
        }
        dong.renderText({ font: { family: "sans-serif", size: 13 }, color: "#b1bac4", lines: lines });
        n++;
        return n;
    }

    function tick() {
        t++;
        var now = Date.now();
        if (lastFpsTime === 0) lastFpsTime = now;
        frameCount++;
        if (now - lastFpsTime >= 1000) {
            fps = frameCount;
            frameCount = 0;
            lastFpsTime = now;
        }

        updateParticles();
        updateObstacles();

        dong.clearOverlay();
        var overlayCount = 0;
        var lineCount = 0;

        if (currentMode === 'dashboard') {
            overlayCount += drawParticles(60);
            overlayCount += drawObstacles();
            lineCount = drawTextFlow();
            overlayCount += 1;
            overlayCount += drawGrid();
        } else if (currentMode === 'textflow') {
            overlayCount += drawObstacles();
            lineCount = drawTextFlow();
            overlayCount += 1;
        } else if (currentMode === 'particles') {
            overlayCount += drawParticles(MAX_PARTICLES);
        } else if (currentMode === 'charts') {
            overlayCount += drawCharts();
        } else if (currentMode === 'settings') {
            overlayCount += drawSettings();
        }

        // HUD via overlay (zero DOM touch per frame)
        dong.renderText({
            font: { family: "sans-serif", size: 11 },
            color: "#484f58",
            lines: [{ x: PANEL_LEFT + 16, y: PANEL_BOTTOM - 14,
                       text: fps + ' fps | mode: ' + currentMode + ' | overlay: ' + overlayCount }]
        });

        // Update DOM stats only once per second (when FPS counter resets)
        if (frameCount === 1) {
            document.getElementById('ov-count').textContent = overlayCount;
            document.getElementById('p-count').textContent =
                currentMode === 'particles' ? MAX_PARTICLES : (currentMode === 'dashboard' ? 60 : 0);
        }
    }

    setInterval(tick, 16);
})();
</script>
</body>
</html>
