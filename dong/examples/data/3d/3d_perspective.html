<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CSS 3D UI Demo</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: radial-gradient(circle at center, #0f2027, #0a0f14 70%);
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
  }

  /* 透视空间 */
  .scene {
    width: 100%;
    height: 100%;
    perspective: 900px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .world {
    transform-style: preserve-3d;
    transition: transform 0.2s ease-out;
  }

  /* 地板网格 */
  .floor {
    position: absolute;
    width: 1200px;
    height: 1200px;
    background: repeating-linear-gradient(
      to right,
      rgba(255,255,255,0.05) 0px,
      rgba(255,255,255,0.05) 1px,
      transparent 1px,
      transparent 60px
    ),
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.05) 0px,
      rgba(255,255,255,0.05) 1px,
      transparent 1px,
      transparent 60px
    );
    transform: rotateX(90deg) translateZ(-200px);
  }

  /* 主面板 */
  .panel {
    position: absolute;
    width: 420px;
    padding: 20px;
    border-radius: 16px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    transform: translateZ(120px);
  }

  .panel h2 {
    margin-top: 0;
    font-weight: 400;
    letter-spacing: 1px;
  }

  /* 卡片组 */
  .cards {
    display: flex;
    gap: 20px;
    margin-top: 15px;
  }

  .card {
    width: 120px;
    height: 160px;
    border-radius: 12px;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    transform-style: preserve-3d;
    transition: transform 0.4s ease;
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
  }

  .card:hover {
    transform: translateZ(60px) rotateY(20deg) rotateX(10deg);
  }

  /* 远处浮动UI */
  .floating {
    position: absolute;
    padding: 12px 18px;
    border-radius: 10px;
    background: rgba(0, 255, 200, 0.15);
    border: 1px solid rgba(0,255,200,0.4);
    transform: translateZ(-80px) translateX(260px) translateY(-120px);
    font-size: 14px;
  }

</style>
</head>
<body>

<div class="scene">
  <div class="world" id="world">

    <div class="floor"></div>

    <div class="panel">
      <h2>3D Perspective UI</h2>
      <p>This panel exists in 3D space using only HTML + CSS.</p>
      <div class="cards">
        <div class="card">A</div>
        <div class="card">B</div>
        <div class="card">C</div>
      </div>
    </div>

    <div class="floating">Background HUD Layer</div>

  </div>
</div>

<script>
  const world = document.getElementById("world");

  document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 20;
    const y = (e.clientY / window.innerHeight - 0.5) * -20;
    world.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
  });
</script>

</body>
</html>
