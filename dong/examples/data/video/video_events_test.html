<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 0;
      padding: 22px;
      background: #0b0f14;
      color: #e6eefc;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .card {
      width: 860px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .title {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 10px;
    }
    video {
      width: 640px;
      height: 360px;
      object-fit: cover;
      background: #0f1115;
      border-radius: 10px;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.22);
      opacity: 0.9;
    }
    .log {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.18);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      min-height: 120px;
    }
  </style>
</head>
<body data-porffor-module="video_events_test">
  <div class="card">
    <div class="title">video events test (counters should update across frames)</div>

    <video id="v" autoplay loop muted src="snow.mp4" poster="../images/bg.png"></video>

    <div class="row">
      <span class="pill">loadedmetadata=<b id="c_loadedmetadata">0</b></span>
      <span class="pill">loadeddata=<b id="c_loadeddata">0</b></span>
      <span class="pill">canplay=<b id="c_canplay">0</b></span>
      <span class="pill">play=<b id="c_play">0</b></span>
      <span class="pill">playing=<b id="c_playing">0</b></span>
      <span class="pill">pause=<b id="c_pause">0</b></span>
      <span class="pill">timeupdate=<b id="c_timeupdate">0</b></span>
      <span class="pill">ended=<b id="c_ended">0</b></span>
      <span class="pill">error=<b id="c_error">0</b></span>
    </div>

    <div id="log" class="log">(waiting)</div>
  </div>

</body>
</html>
