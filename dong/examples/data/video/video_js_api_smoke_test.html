<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0f17;
      color: rgba(255,255,255,0.9);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .panel {
      width: 520px;
      padding: 18px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 12px 34px rgba(0,0,0,0.55);
    }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
      background: rgba(255, 90, 90, 0.18);
      border: 1px solid rgba(255, 90, 90, 0.5);
      color: rgb(255, 160, 160);
      margin-bottom: 10px;
    }
    body.ok .badge {
      background: rgba(80, 220, 140, 0.18);
      border: 1px solid rgba(80, 220, 140, 0.5);
      color: rgb(140, 255, 190);
    }
    pre {
      margin: 0;
      padding: 12px;
      border-radius: 10px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12);
      white-space: pre-wrap;
      line-height: 1.4;
    }
    video { display: none; }
  </style>
</head>
<body id="body" data-porffor-module="video_js_api_smoke_test">
  <div class="panel">
    <div class="badge" id="badge">VIDEO JS API: FAIL</div>
    <pre id="out">running...</pre>

    <!-- No src needed: this is a JS API smoke test (play/pause/paused/seeking). -->
    <video id="v" muted></video>
  </div>

</body>
</html>
