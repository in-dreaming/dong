<!-- porffor: ready -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100%; height: 100%; background: #0a1628; }
  </style>
</head>
<body data-porffor-module="porf_game_ui">
<div id="hud-root" style="width:100%;height:100%;font-family:sans-serif;color:#ecf0f1;position:relative;">
  <div style="position:absolute;top:15px;left:15px;">
    <div style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#bdc3c7;margin-bottom:4px;">
        <span>HP</span>
        <span id="hp-label-val">85/100</span>
      </div>
      <div style="width:200px;height:8px;background:#2c3e50;border-radius:4px;overflow:hidden;">
        <div id="hp-fill" style="width:85%;height:100%;background:#27ae60;border-radius:4px;"></div>
      </div>
    </div>
    <div style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#bdc3c7;margin-bottom:4px;">
        <span>MP</span>
        <span id="mp-label-val">60/100</span>
      </div>
      <div style="width:200px;height:8px;background:#2c3e50;border-radius:4px;overflow:hidden;">
        <div id="mp-fill" style="width:60%;height:100%;background:#27ae60;border-radius:4px;"></div>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-top:8px;">
      <button id="btn-damage" style="padding:4px 10px;font-size:11px;background:#e74c3c;color:white;border:none;border-radius:3px;">Damage</button>
      <button id="btn-heal" style="padding:4px 10px;font-size:11px;background:#27ae60;color:white;border:none;border-radius:3px;">Heal</button>
    </div>
  </div>
  <div style="position:absolute;top:15px;right:15px;text-align:right;padding:10px;">
    <div style="font-size:14px;color:#95a5a6;">SCORE</div>
    <div id="score-main" style="font-size:28px;font-weight:bold;color:#ecf0f1;">12750</div>
    <div style="font-size:11px;color:#7f8c8d;">HI: 50000</div>
  </div>
  <div style="position:absolute;bottom:15px;right:15px;width:120px;height:120px;background:#1a252f;border:2px solid #34495e;border-radius:4px;display:flex;align-items:center;justify-content:center;">
    <div style="width:6px;height:6px;background:#3498db;border-radius:50%;"></div>
    <div style="position:absolute;bottom:2px;right:4px;font-size:9px;color:#7f8c8d;">MAP</div>
  </div>
  <div style="position:absolute;bottom:15px;left:50%;margin-left:-208px;display:flex;gap:4px;">
    <div style="width:48px;height:48px;background:#2c3e50;border:1px solid #34495e;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;">⚔</div>
    <div style="width:48px;height:48px;background:#2c3e50;border:1px solid #34495e;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;">🛡</div>
    <div style="width:48px;height:48px;background:#2c3e50;border:1px solid #34495e;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;">❤</div>
    <div style="width:48px;height:48px;background:#2c3e50;border:1px solid #34495e;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;">★</div>
    <div style="width:48px;height:48px;background:#1a252f;border:1px solid #34495e;border-radius:4px;"></div>
    <div style="width:48px;height:48px;background:#1a252f;border:1px solid #34495e;border-radius:4px;"></div>
    <div style="width:48px;height:48px;background:#1a252f;border:1px solid #34495e;border-radius:4px;"></div>
    <div style="width:48px;height:48px;background:#1a252f;border:1px solid #34495e;border-radius:4px;"></div>
  </div>
</div>
</body>
</html>
