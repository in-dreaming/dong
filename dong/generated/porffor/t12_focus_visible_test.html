<!DOCTYPE html>
<!-- porffor: blocked(T12) -->
<html>
<head>
    <title>:focus-visible Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        /* Test :focus-visible pseudo-class */
        button:focus-visible {
            outline: 3px solid red;
            outline-offset: 2px;
        }
        
        input:focus-visible {
            border: 3px solid blue;
            background-color: lightyellow;
        }
        
        .custom-focus:focus-visible {
            outline: 4px dashed green;
            background-color: lightgreen;
        }
        
        /* Test :focus-within pseudo-class */
        .form-group:focus-within {
            background-color: lightblue;
            padding: 10px;
            border-radius: 5px;
        }
        
        .form-group {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ccc;
        }
        
        button, input {
            margin: 5px;
            padding: 10px 15px;
            font-size: 14px;
        }
        
        .info {
            margin: 20px 0;
            padding: 15px;
            background: #f5f5f5;
            border-left: 4px solid #333;
        }
    </style>
</head>
<body>
    <h1>:focus-visible and :focus-within Test</h1>
    
    <div class="info">
        <p><strong>Instructions:</strong></p>
        <ul>
            <li>Use <strong>Tab key</strong> to navigate - you should see focus indicators (:focus-visible)</li>
            <li>Use <strong>mouse click</strong> - focus indicators may differ</li>
            <li>Click inside the form group - it will highlight due to :focus-within</li>
        </ul>
    </div>
    
    <div class="form-group">
        <label>Form Group 1 (:focus-within test)</label><br>
        <input type="text" placeholder="Input 1" id="input1">
        <button id="btn1">Button 1</button>
    </div>
    
    <div class="form-group">
        <label>Form Group 2 (:focus-within test)</label><br>
        <input type="text" placeholder="Input 2" class="custom-focus">
        <button class="custom-focus">Button 2 (custom focus)</button>
    </div>
    
    <div style="margin-top: 20px;">
        <input type="text" placeholder="Standalone input" id="standalone">
        <button id="__porf_auto_0">Test Programmatic Focus</button>
    </div>
    
    <div id="output" style="margin-top: 20px; padding: 10px; background: #f0f0f0;"></div>
    
    <script>
        function log(msg) {
            const output = document.getElementById('output');
            output.innerHTML += msg + '<br>';
        }
        
        function testFocus() {
            const input = document.getElementById('input1');
            input.focus();
            log('Focus set on Input 1 programmatically');
        }
        
        // Log focus events
        document.getElementById('input1').addEventListener('focus', function() {
            log('Input 1 received focus');
        });
        
        document.getElementById('btn1').addEventListener('focus', function() {
            log('Button 1 received focus');
        });
    </script>
</body>
</html>
