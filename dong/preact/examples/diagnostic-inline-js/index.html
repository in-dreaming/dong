<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diagnostic: Inline JavaScript</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f5f5f5; }
        #root { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // Inline JavaScript - direct DOM manipulation
        const root = document.getElementById('root');

        if (root) {
            root.innerHTML = `
                <div style="
                    width: 100%;
                    height: 100%;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    background: #f5f5f5;
                ">
                    <div style="
                        width: 400px;
                        padding: 40px;
                        background: white;
                        border-radius: 8px;
                        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                        text-align: center;
                    ">
                        <h1 style="color: #1a1a1a; margin-bottom: 20px;">
                            ✅ Inline JavaScript Works!
                        </h1>
                        <p style="color: #666; margin-bottom: 16px;">
                            If you see this message, inline JavaScript is executing correctly.
                        </p>
                        <div style="display: flex; gap: 8px; justify-content: center;">
                            <button style="
                                padding: 10px 16px;
                                background: #0066cc;
                                color: white;
                                border: none;
                                border-radius: 4px;
                                cursor: pointer;
                            ">Click Me</button>
                            <button style="
                                padding: 10px 16px;
                                background: #4caf50;
                                color: white;
                                border: none;
                                border-radius: 4px;
                                cursor: pointer;
                            ">Test Button</button>
                        </div>
                    </div>
                </div>
            `;
            console.log("✅ root element found and content set");
        } else {
            console.error("❌ root element not found");
        }
    </script>
</body>
</html>
